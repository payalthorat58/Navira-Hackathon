<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>डिजिटल सारथी — अपना डिवाइस चुनें</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap');

    body.dark {
      --bg-base:       #020b18;
      --bg-mid:        #04112a;
      --page-bg:       #020b18;
      --body-color:    #f0f6ff;
      --nav-bg:        rgba(2,11,24,0.4);
      --overlay-a:     rgba(2,11,24,0.72);
      --overlay-b:     rgba(5,21,43,0.60);
      --overlay-c:     rgba(2,11,24,0.80);
      --glass-bg:      rgba(10,37,69,0.45);
      --glass-border:  rgba(78,163,232,0.25);
      --card-bg-a:     rgba(10,37,70,0.55);
      --card-bg-b:     rgba(5,21,43,0.70);
      --text-primary:  #f0f6ff;
      --text-muted:    rgba(240,246,255,0.62);
      --text-faint:    rgba(240,246,255,0.35);
      --text-soft:     rgba(240,246,255,0.55);
      --text-nav:      rgba(240,246,255,0.65);
      --tagline-color: rgba(240,246,255,0.72);
      --hint-color:    rgba(240,246,255,0.35);
      --scroll-border: rgba(240,246,255,0.3);
      --toggle-bg:     rgba(10,37,69,0.6);
      --toggle-border: rgba(78,163,232,0.35);
      --toggle-color:  rgba(240,246,255,0.7);
    }

    body.light {
      --bg-base:       #dbeafe;
      --bg-mid:        #eff6ff;
      --page-bg:       #f0f6ff;
      --body-color:    #0a2540;
      --nav-bg:        rgba(240,246,255,0.65);
      --overlay-a:     rgba(219,234,254,0.55);
      --overlay-b:     rgba(239,246,255,0.40);
      --overlay-c:     rgba(219,234,254,0.60);
      --glass-bg:      rgba(255,255,255,0.55);
      --glass-border:  rgba(46,134,222,0.30);
      --card-bg-a:     rgba(255,255,255,0.65);
      --card-bg-b:     rgba(240,246,255,0.80);
      --text-primary:  #0a2540;
      --text-muted:    rgba(10,37,64,0.65);
      --text-faint:    rgba(10,37,64,0.40);
      --text-soft:     rgba(10,37,64,0.58);
      --text-nav:      rgba(10,37,64,0.70);
      --tagline-color: rgba(10,37,64,0.72);
      --hint-color:    rgba(10,37,64,0.40);
      --scroll-border: rgba(10,37,64,0.25);
      --toggle-bg:     rgba(255,255,255,0.7);
      --toggle-border: rgba(46,134,222,0.40);
      --toggle-color:  #0a2540;
    }

    :root {
      --blue-mid:    #0d3b7a;
      --blue-bright: #2e86de;
      --blue-glow:   #4fa3e8;
      --blue-ice:    #7ec8e3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    html, body { width: 100%; min-height: 100%; overflow-x: hidden; font-family: 'Jost', sans-serif; }
    body {
      background: var(--page-bg);
      color: var(--body-color);
      transition: background 0.45s ease, color 0.45s ease;
    }

    nav, .overlay, .lang-card, .nav-links a {
      transition: background 0.45s ease, color 0.45s ease,
                  border-color 0.45s ease, backdrop-filter 0.45s ease;
    }

    #bg-canvas { position: fixed; inset: 0; z-index: 0; width: 100%; height: 100%; will-change: transform; }
    .overlay {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(160deg, var(--overlay-a) 0%, var(--overlay-b) 50%, var(--overlay-c) 100%);
    }
    #particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 3rem;
      background: var(--nav-bg);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--glass-border);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem; font-weight: 600; letter-spacing: 0.12em;
      color: var(--blue-ice); text-transform: uppercase;
      text-shadow: 0 0 18px rgba(126,200,227,0.5);
      text-decoration: none;
    }
    body.light .nav-logo { color: #0d3b7a; text-shadow: 0 0 18px rgba(13,59,122,0.25); }
    .nav-right { display: flex; align-items: center; gap: 2rem; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--text-nav);
      font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 300;
    }
    .nav-links a:hover { color: var(--blue-glow); }

    #themeToggle {
      display: flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--toggle-bg); border: 1px solid var(--toggle-border);
      backdrop-filter: blur(12px); cursor: pointer;
      font-size: 1.1rem; color: var(--toggle-color); flex-shrink: 0;
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.45s ease, border-color 0.45s ease;
    }
    #themeToggle:hover { transform: scale(1.12) rotate(15deg); box-shadow: 0 0 18px rgba(46,134,222,0.45); }
    #themeToggle:active { transform: scale(0.93); }

    /* PAGE WRAPPER */
    .page-wrapper {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 8rem 2rem 5rem;
    }

    /* HERO */
    .hero { display: flex; flex-direction: column; align-items: center; gap: 1.4rem; text-align: center; margin-bottom: 4.5rem; }

    .eyebrow {
      font-size: 0.72rem; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--blue-ice); font-weight: 300;
      opacity: 0; animation: fadeUp 0.9s ease forwards 0.2s;
    }
    body.light .eyebrow { color: #1a5fb4; }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 700; line-height: 0.95; letter-spacing: 0.05em;
      color: var(--text-primary);
      text-shadow: 0 0 40px rgba(78,163,232,0.55), 0 0 90px rgba(46,134,222,0.25), 0 4px 30px rgba(0,0,0,0.15);
      opacity: 0; animation: fadeUp 1s ease forwards 0.45s;
      position: relative; will-change: transform;
    }
    body.light .hero-title { text-shadow: 0 0 30px rgba(46,134,222,0.35), 0 2px 16px rgba(0,0,0,0.08); }
    .hero-title .line2 {
      display: block; font-style: italic; color: var(--blue-ice);
      font-size: 0.58em; letter-spacing: 0.12em;
    }
    body.light .hero-title .line2 { color: #1a5fb4; }

    .hero-divider {
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue-glow), transparent);
      opacity: 0; animation: fadeIn 1s ease forwards 0.8s;
    }

    .tagline {
      font-size: clamp(0.88rem, 2vw, 1.1rem); font-weight: 200; letter-spacing: 0.06em;
      color: var(--tagline-color); max-width: 440px; line-height: 1.75;
      opacity: 0; animation: fadeUp 1s ease forwards 0.7s;
    }
    .tagline em { font-style: italic; color: var(--blue-ice); }
    body.light .tagline em { color: #1a5fb4; }

    /* KEYBOARD HINT */
    .keyboard-hint {
      opacity: 0; animation: fadeIn 1s ease forwards 1.3s;
      display: flex; align-items: center; gap: 0.6rem;
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--hint-color); font-weight: 300;
    }
    .kbd {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 5px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      font-size: 0.72rem; font-weight: 500; color: var(--text-muted);
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    /* VOICE BUTTON */
    .voice-btn-wrap {
      opacity: 0; animation: fadeIn 1s ease forwards 1.5s;
    }
    .voice-btn {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 1.5rem;
      font-family: 'Jost', sans-serif; font-size: 0.75rem;
      font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--blue-ice);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 50px; cursor: pointer;
      backdrop-filter: blur(16px);
      transition: transform 0.22s ease, box-shadow 0.22s ease,
                  border-color 0.22s ease, color 0.22s ease,
                  background 0.45s ease;
    }
    body.light .voice-btn { color: #1a5fb4; }
    .voice-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 24px rgba(46,134,222,0.35);
      border-color: rgba(78,163,232,0.55);
    }
    .voice-btn:active { transform: scale(0.96); }
    .voice-btn.speaking {
      border-color: rgba(78,163,232,0.8);
      box-shadow: 0 0 30px rgba(46,134,222,0.5);
      color: var(--blue-glow);
    }
    .voice-btn .voice-icon { font-size: 1rem; transition: transform 0.3s ease; }
    .voice-btn.speaking .voice-icon { animation: pulse-icon 0.8s ease-in-out infinite; }

    /* CARDS WRAPPER */
    .lang-cards-wrapper {
      display: flex; gap: 2.2rem; justify-content: center; align-items: stretch;
      opacity: 0; animation: fadeUp 1s ease forwards 1s;
      flex-wrap: wrap;
    }

    /* DEVICE CARD */
    .lang-card {
      position: relative; overflow: hidden;
      width: 270px; min-height: 360px;
      background: linear-gradient(145deg, var(--card-bg-a) 0%, var(--card-bg-b) 100%);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      backdrop-filter: blur(24px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.85rem; padding: 2.4rem 2rem 2.2rem;
      cursor: pointer; text-align: center;
      animation: floatY 6s ease-in-out infinite;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.35s ease, border-color 0.35s ease, background 0.45s ease;
      will-change: transform;
      user-select: none;
      perspective: 800px;
    }
    .lang-card:nth-child(2) { animation-delay: 1s; animation-duration: 7s; }

    .lang-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(126,200,227,0.10) 0%, transparent 60%);
      border-radius: 28px; opacity: 0; transition: opacity 0.35s ease; pointer-events: none;
    }
    .lang-card::after {
      content: '';
      position: absolute; top: -60%; left: -60%;
      width: 220%; height: 220%;
      background: conic-gradient(from 0deg, transparent 0%, rgba(78,163,232,0.05) 30%, transparent 60%);
      border-radius: 50%; opacity: 0; transition: opacity 0.4s ease; pointer-events: none;
      animation: rotateSlow 8s linear infinite;
    }

    .lang-card:hover {
      transform: translateY(-14px) scale(1.04);
      box-shadow:
        0 28px 80px rgba(46,134,222,0.28),
        0 0 60px rgba(46,134,222,0.15),
        0 6px 30px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(126,200,227,0.18);
      border-color: rgba(78,163,232,0.6);
    }
    .lang-card:hover::before { opacity: 1; }
    .lang-card:hover::after  { opacity: 1; }
    .lang-card:hover .card-icon-wrap {
      box-shadow: 0 0 40px rgba(46,134,222,0.6), 0 0 80px rgba(46,134,222,0.2);
      transform: scale(1.08);
    }
    .lang-card:active { transform: scale(0.97); }

    /* SELECTED */
    .lang-card.selected {
      border-color: rgba(78,163,232,0.9);
      box-shadow:
        0 0 60px rgba(46,134,222,0.5),
        0 0 120px rgba(46,134,222,0.2),
        0 20px 60px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(126,200,227,0.2);
      animation: pulseGlow 1.5s ease-in-out infinite, floatY 6s ease-in-out infinite;
    }

    /* BIG NUMBER */
    .card-big-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4.5rem; font-weight: 700; line-height: 1;
      background: linear-gradient(135deg, var(--blue-bright) 0%, var(--blue-ice) 60%, #fff 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(78,163,232,0.7)) drop-shadow(0 0 40px rgba(46,134,222,0.4));
      letter-spacing: -0.02em;
      transition: filter 0.3s ease;
    }
    .lang-card:hover .card-big-number {
      filter: drop-shadow(0 0 28px rgba(78,163,232,0.95)) drop-shadow(0 0 60px rgba(46,134,222,0.6));
    }

    .card-icon-wrap {
      width: 76px; height: 76px; border-radius: 22px;
      background: linear-gradient(135deg, var(--blue-mid) 0%, var(--blue-bright) 60%, var(--blue-glow) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      box-shadow: 0 0 28px rgba(46,134,222,0.45), 0 4px 16px rgba(0,0,0,0.2);
      transition: box-shadow 0.35s ease, transform 0.35s ease;
      flex-shrink: 0;
    }

    .card-lang-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.1rem; font-weight: 700; letter-spacing: 0.04em;
      color: var(--text-primary); line-height: 1;
    }

    .card-lang-sub {
      font-size: 0.84rem; font-weight: 300; letter-spacing: 0.06em;
      color: var(--text-muted); line-height: 1.5;
    }

    .card-tag {
      display: inline-block; margin-top: 0.4rem;
      font-size: 0.67rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--blue-glow);
      border: 1px solid var(--glass-border);
      border-radius: 30px; padding: 0.28rem 0.8rem;
      transition: border-color 0.3s ease, color 0.3s ease;
    }
    body.light .card-tag { color: #1a5fb4; }
    .lang-card:hover .card-tag { border-color: rgba(78,163,232,0.55); }

    .card-arrow {
      margin-top: 0.3rem;
      font-size: 1.1rem; color: var(--blue-glow);
      opacity: 0; transform: translateX(-6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .lang-card:hover .card-arrow { opacity: 1; transform: translateX(0); }

    /* RIPPLE */
    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(78,163,232,0.22);
      transform: scale(0); animation: ripple 0.7s linear;
      pointer-events: none;
    }

    /* FOOTER NOTE */
    .page-footer-note {
      margin-top: 4rem;
      font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--hint-color); font-weight: 300;
      opacity: 0; animation: fadeIn 1.2s ease forwards 1.8s;
    }

    /* KEYFRAMES */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes floatY {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }
    @keyframes ripple { to { transform: scale(5); opacity: 0; } }
    @keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulseGlow {
      0%,100% { box-shadow: 0 0 60px rgba(46,134,222,0.5), 0 0 120px rgba(46,134,222,0.2), 0 20px 60px rgba(0,0,0,0.25); }
      50%      { box-shadow: 0 0 90px rgba(46,134,222,0.75), 0 0 160px rgba(46,134,222,0.35), 0 20px 60px rgba(0,0,0,0.25); }
    }
    @keyframes spinPop {
      0%   { transform: scale(0.7) rotate(-30deg); opacity: 0; }
      60%  { transform: scale(1.2) rotate(8deg);   opacity: 1; }
      100% { transform: scale(1)   rotate(0deg);    opacity: 1; }
    }
    @keyframes pulse-icon {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.3); }
    }
    .toggle-anim { animation: spinPop 0.32s ease forwards; }

    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.4rem; }
      .nav-links { display: none; }
      .lang-cards-wrapper { flex-direction: column; align-items: center; }
      .lang-card { width: 100%; max-width: 320px; min-height: 300px; }
      #themeToggle { width: 34px; height: 34px; font-size: 1rem; }
      .card-big-number { font-size: 3.5rem; }
    }
  </style>
</head>
<body class="dark">

  <canvas id="bg-canvas"></canvas>
  <div class="overlay"></div>
  <canvas id="particles"></canvas>

  <nav>
    <a href="index.html" class="nav-logo">डिजिटल सारथी</a>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="#">हमारे बारे में</a></li>
        <li><a href="#">संपर्क करें</a></li>
      </ul>
      <button id="themeToggle" aria-label="थीम बदलें" title="लाइट/डार्क मोड">🌙</button>
    </div>
  </nav>

  <div class="page-wrapper">

    <div class="hero">
      
      <h1 class="hero-title" id="heroTitle">
        अपना
        <span class="line2">साधन चुनें</span>
      </h1>
      <div class="hero-divider"></div>
      
      
      <div class="voice-btn-wrap">
        <button class="voice-btn" id="voiceBtn" aria-label="वॉइस गाइड चलाएं">
          <span class="voice-icon">🔊</span>
          <span class="voice-label">वॉइस गाइड चलाएं</span>
        </button>
      </div>
    </div>

    <div class="lang-cards-wrapper" id="cardsWrapper">

      <!-- CARD 1: लैपटॉप -->
      <div class="lang-card" id="card-laptop" role="button" tabindex="0" aria-label="लैपटॉप चुनें">
        <div class="card-big-number">1</div>
        <div class="card-icon-wrap">💻</div>
        <div class="card-lang-title">लैपटॉप</div>
        <div class="card-lang-sub">लैपटॉप से जारी रखें</div>
        <span class="card-tag">चुनें →</span>
        <div class="card-arrow">→</div>
      </div>

      <!-- CARD 2: मोबाइल -->
      <div class="lang-card" id="card-mobile" role="button" tabindex="0" aria-label="मोबाइल चुनें">
        <div class="card-big-number">2</div>
        <div class="card-icon-wrap">📱</div>
        <div class="card-lang-title">मोबाइल</div>
        <div class="card-lang-sub">मोबाइल से जारी रखें</div>
        <span class="card-tag">चुनें →</span>
        <div class="card-arrow">→</div>
      </div>

    </div>

    <p class="page-footer-note">आपकी पसंद कभी भी सेटिंग्स में बदली जा सकती है</p>
  </div>

  <script>
    /* ── THEME ── */
    (function () {
      const body   = document.body;
      const btn    = document.getElementById('themeToggle');
      const stored = localStorage.getItem('theme') || 'dark';
      function applyTheme(theme, animate) {
        body.classList.remove('dark','light');
        body.classList.add(theme);
        btn.textContent = theme === 'dark' ? '🌙' : '☀️';
        localStorage.setItem('theme', theme);
        if (animate) {
          btn.classList.remove('toggle-anim');
          void btn.offsetWidth;
          btn.classList.add('toggle-anim');
        }
      }
      applyTheme(stored, false);
      btn.addEventListener('click', function () {
        applyTheme(body.classList.contains('dark') ? 'light' : 'dark', true);
      });
    })();

    /* ── WAVE BACKGROUND ── */
    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx    = canvas.getContext('2d');
      let W, H, t = 0;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize); resize();
      const darkWaves = [
        { amp:80,  freq:0.003,  speed:0.40, yFrac:0.55, alpha:0.07, color:'#1a5fb4' },
        { amp:55,  freq:0.004,  speed:0.60, yFrac:0.60, alpha:0.08, color:'#2e86de' },
        { amp:100, freq:0.002,  speed:0.25, yFrac:0.50, alpha:0.05, color:'#0d3b7a' },
        { amp:40,  freq:0.006,  speed:0.80, yFrac:0.65, alpha:0.06, color:'#4fa3e8' },
        { amp:70,  freq:0.0035, speed:0.50, yFrac:0.45, alpha:0.04, color:'#7ec8e3' },
      ];
      const lightWaves = [
        { amp:80,  freq:0.003,  speed:0.40, yFrac:0.55, alpha:0.10, color:'#93c5fd' },
        { amp:55,  freq:0.004,  speed:0.60, yFrac:0.60, alpha:0.12, color:'#60a5fa' },
        { amp:100, freq:0.002,  speed:0.25, yFrac:0.50, alpha:0.07, color:'#bfdbfe' },
        { amp:40,  freq:0.006,  speed:0.80, yFrac:0.65, alpha:0.08, color:'#3b82f6' },
        { amp:70,  freq:0.0035, speed:0.50, yFrac:0.45, alpha:0.05, color:'#dbeafe' },
      ];
      function isDark() { return document.body.classList.contains('dark'); }
      function draw() {
        ctx.clearRect(0,0,W,H);
        if (isDark()) {
          const g = ctx.createLinearGradient(0,0,W,H);
          g.addColorStop(0,'#020b18'); g.addColorStop(0.5,'#04112a'); g.addColorStop(1,'#020b18');
          ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
        } else {
          const g = ctx.createLinearGradient(0,0,W,H);
          g.addColorStop(0,'#dbeafe'); g.addColorStop(0.5,'#eff6ff'); g.addColorStop(1,'#dbeafe');
          ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
        }
        const waves = isDark() ? darkWaves : lightWaves;
        waves.forEach((w,i) => {
          const yBase = H * w.yFrac;
          ctx.save(); ctx.globalAlpha = w.alpha; ctx.beginPath(); ctx.moveTo(0,H);
          for (let x=0; x<=W; x+=4) {
            const y = yBase
              + Math.sin(x * w.freq + t * w.speed + i * 1.2) * w.amp
              + Math.cos(x * w.freq * 0.5 + t * w.speed * 0.7 + i) * (w.amp * 0.4);
            ctx.lineTo(x,y);
          }
          ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
          ctx.fillStyle = w.color; ctx.fill(); ctx.restore();
        });
        const radA = isDark() ? 'rgba(46,134,222,0.08)'  : 'rgba(46,134,222,0.10)';
        const radB = isDark() ? 'rgba(13,59,122,0.04)'   : 'rgba(147,197,253,0.06)';
        const radC = isDark() ? 'rgba(2,11,24,0)'        : 'rgba(240,246,255,0)';
        const grd = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.55);
        grd.addColorStop(0,radA); grd.addColorStop(0.5,radB); grd.addColorStop(1,radC);
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
        t += 0.012;
        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ── PARTICLES ── */
    (function () {
      const canvas = document.getElementById('particles');
      const ctx    = canvas.getContext('2d');
      let W, H;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize); resize();
      function isDark() { return document.body.classList.contains('dark'); }
      class Particle {
        constructor() { this.reset(true); }
        reset(init) {
          this.x = Math.random() * W;
          this.y = init ? Math.random() * H : H + 10;
          this.size = Math.random() * 1.8 + 0.4;
          this.speed = Math.random() * 0.4 + 0.1;
          this.opacity = Math.random() * 0.6 + 0.1;
          this.drift = (Math.random() - 0.5) * 0.3;
          this.twinkle = Math.random() * Math.PI * 2;
          this.twinkleSpeed = Math.random() * 0.03 + 0.01;
          this.hue = 190 + Math.floor(Math.random() * 40);
        }
        update() {
          this.y -= this.speed; this.x += this.drift; this.twinkle += this.twinkleSpeed;
          if (this.y < -5) this.reset(false);
        }
        draw() {
          const a = this.opacity * (0.6 + 0.4 * Math.sin(this.twinkle)) * (isDark() ? 1 : 0.5);
          ctx.save(); ctx.globalAlpha = a;
          ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
          ctx.fillStyle = `hsl(${this.hue},80%,${isDark() ? 85 : 55}%)`; ctx.fill(); ctx.restore();
        }
      }
      const particles = Array.from({length:120}, () => new Particle());
      function loop() {
        ctx.clearRect(0,0,W,H);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
      }
      loop();
    })();

    /* ── PARALLAX ON SCROLL ── */
    (function () {
      const bgCanvas = document.getElementById('bg-canvas');
      let ticking = false;
      window.addEventListener('scroll', function () {
        if (!ticking) {
          requestAnimationFrame(function () {
            bgCanvas.style.transform = 'translateY(' + (window.scrollY * 0.30) + 'px)';
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });
    })();

    /* ── MOUSE PARALLAX ON TITLE ── */
    (function () {
      const heroTitle = document.getElementById('heroTitle');
      let tx=0, ty=0, cx=0, cy=0;
      document.addEventListener('mousemove', function (e) {
        tx = (e.clientX - window.innerWidth  / 2) / (window.innerWidth  / 2);
        ty = (e.clientY - window.innerHeight / 2) / (window.innerHeight / 2);
      });
      function lerp(a,b,f) { return a + (b-a)*f; }
      function isDark() { return document.body.classList.contains('dark'); }
      function tick() {
        cx = lerp(cx, tx, 0.07);
        cy = lerp(cy, ty, 0.07);
        const sa = isDark() ? 0.55 : 0.35;
        const sb = isDark() ? 0.25 : 0.15;
        const sc = isDark() ? 0.15 : 0.08;
        heroTitle.style.textShadow = `
          ${cx*14}px ${cy*10}px 40px rgba(78,163,232,${sa}),
          0 0 90px rgba(46,134,222,${sb}),
          0 4px 30px rgba(0,0,0,${sc})
        `;
        requestAnimationFrame(tick);
      }
      tick();
    })();

    /* ── HOVER 3D TILT ── */
    document.querySelectorAll('.lang-card').forEach(card => {
      card.addEventListener('mousemove', function (e) {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width  - 0.5) * 2;
        const y = ((e.clientY - rect.top)  / rect.height - 0.5) * 2;
        card.style.transform = `translateY(-14px) scale(1.04) rotateX(${-y*4}deg) rotateY(${x*4}deg)`;
      });
      card.addEventListener('mouseleave', function () {
        card.style.transform = '';
      });
    });

    /* ── RIPPLE ── */
    function addRipple(card, e) {
      const rect = card.getBoundingClientRect();
      const rpl  = document.createElement('span');
      rpl.className = 'ripple';
      const size = Math.max(rect.width, rect.height) * 2.5;
      rpl.style.cssText = `
        width:${size}px; height:${size}px;
        left:${e.clientX - rect.left - size/2}px;
        top:${e.clientY - rect.top  - size/2}px;
      `;
      card.appendChild(rpl);
      setTimeout(() => rpl.remove(), 750);
    }

    /* ── DEVICE SELECTION ── */
    function selectDevice(device, card, e) {
      if (e && e.clientX) addRipple(card, e);
      document.querySelectorAll('.lang-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      localStorage.setItem('selectedDevice', device);
      setTimeout(function () {
        window.location.href = 'nextpage.html';
      }, 520);
    }

    const cardLaptop = document.getElementById('card-laptop');
    const cardMobile = document.getElementById('card-mobile');

    cardLaptop.addEventListener('click', function (e) { selectDevice('laptop', this, e); });
    cardMobile.addEventListener('click', function (e) { selectDevice('mobile', this, e); });

    [cardLaptop, cardMobile].forEach(card => {
      card.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          const dev = card.id === 'card-laptop' ? 'laptop' : 'mobile';
          const rect = card.getBoundingClientRect();
          selectDevice(dev, card, { clientX: rect.left + rect.width/2, clientY: rect.top + rect.height/2 });
        }
      });
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === '1') {
        const rect = cardLaptop.getBoundingClientRect();
        cardLaptop.focus();
        selectDevice('laptop', cardLaptop, { clientX: rect.left + rect.width/2, clientY: rect.top + rect.height/2 });
      } else if (e.key === '2') {
        const rect = cardMobile.getBoundingClientRect();
        cardMobile.focus();
        selectDevice('mobile', cardMobile, { clientX: rect.left + rect.width/2, clientY: rect.top + rect.height/2 });
      }
    });

   /* ── VOICE BUTTON FOR DEVICE-HI.HTML (No Popups) ── */
(function () {
  const voiceBtn = document.getElementById('voiceBtn');  // Matches id="voiceBtn" in HTML
  if (!voiceBtn) return;
  
  let audio = null;
  let isPlaying = false;

  // Audio file for Hindi device page
  const AUDIO_PATH = "device-hi.mp3";
  
  voiceBtn.addEventListener('click', function () {
    if (isPlaying && audio) {
      audio.pause();
      audio.currentTime = 0;
      isPlaying = false;
      voiceBtn.classList.remove('speaking');
      voiceBtn.querySelector('.voice-label').textContent = 'वॉइस गाइड चलाएं';
      return;
    }
    
    if (audio) {
      audio.pause();
      audio = null;
    }
    
    audio = new Audio(AUDIO_PATH);
    
    audio.onplay = function() {
      isPlaying = true;
      voiceBtn.classList.add('speaking');
      voiceBtn.querySelector('.voice-label').textContent = 'बंद करें';
    };
    
    audio.onended = function() {
      isPlaying = false;
      voiceBtn.classList.remove('speaking');
      voiceBtn.querySelector('.voice-label').textContent = 'वॉइस गाइड चलाएं';
    };
    
    audio.onerror = function() {
      // Silent fail - no popup
      voiceBtn.classList.remove('speaking');
      voiceBtn.querySelector('.voice-label').textContent = 'वॉइस गाइड चलाएं';
    };
    
    audio.play().catch(function() {
      // Silent fail - no popup
    });
  });
})();
  </script>
