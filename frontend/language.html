    /* ========= VOICE BUTTON STYLES ========= */
.voice-btn-wrap {
  margin-top: 1rem;
}

.voice-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
  padding: 0.9rem 2.2rem;
  font-family: 'Jost', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--blue-ice);
  background: linear-gradient(135deg, var(--glass-bg), rgba(78,163,232,0.15));
  border: 1.5px solid rgba(78,163,232,0.4);
  border-radius: 60px;
  cursor: pointer;
  backdrop-filter: blur(16px);
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
}

body.light .voice-btn {
  background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(46,134,222,0.1));
  color: #1a5fb4;
  border-color: rgba(46,134,222,0.4);
}

/* Hover effect */
.voice-btn:hover {
  transform: translateY(-3px) scale(1.02);
  border-color: rgba(78,163,232,0.7);
  box-shadow: 0 8px 25px rgba(46,134,222,0.3);
  background: linear-gradient(135deg, rgba(78,163,232,0.25), rgba(46,134,222,0.12));
}

/* Active/Click effect */
.voice-btn:active {
  transform: scale(0.97);
  transition: transform 0.1s ease;
}

/* Voice icon styling */
.voice-btn .voice-icon {
  font-size: 1.2rem;
  transition: transform 0.2s ease;
}

.voice-btn:hover .voice-icon {
  transform: scale(1.15);
}

/* Speaking state (when audio is playing) */
.voice-btn.speaking {
  border-color: #4fa3e8;
  box-shadow: 0 0 25px rgba(78,163,232,0.5);
  background: linear-gradient(135deg, rgba(78,163,232,0.25), rgba(46,134,222,0.12));
}

.voice-btn.speaking .voice-icon {
  animation: pulse-icon 0.8s ease-in-out infinite;
}

/* Pulse animation for speaking state */
@keyframes pulse-icon {
  0%, 100% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.25);
  }
}

/* Mobile responsive */
@media (max-width: 768px) {
  .voice-btn {
    padding: 0.7rem 1.5rem;
    font-size: 0.7rem;
    gap: 0.6rem;
  }
  
  .voice-btn .voice-icon {
    font-size: 1rem;
  }
}

/* Optional: Add focus outline for accessibility */
.voice-btn:focus-visible {
  outline: 2px solid var(--blue-glow);
  outline-offset: 3px;
}

    body.light {
      --bg-base:       #dbeafe;
      --bg-mid:        #eff6ff;
      --page-bg:       #f0f6ff;
      --body-color:    #0a2540;
      --nav-bg:        rgba(240,246,255,0.65);
      --overlay-a:     rgba(219,234,254,0.55);
      --overlay-b:     rgba(239,246,255,0.40);
      --overlay-c:     rgba(219,234,254,0.60);
      --glass-bg:      rgba(255,255,255,0.55);
      --glass-border:  rgba(46,134,222,0.30);
      --card-bg-a:     rgba(255,255,255,0.65);
      --card-bg-b:     rgba(240,246,255,0.80);
      --text-primary:  #0a2540;
      --text-muted:    rgba(10,37,64,0.65);
      --text-faint:    rgba(10,37,64,0.40);
      --text-soft:     rgba(10,37,64,0.58);
      --text-nav:      rgba(10,37,64,0.70);
      --tagline-color: rgba(10,37,64,0.72);
      --hint-color:    rgba(10,37,64,0.40);
      --scroll-border: rgba(10,37,64,0.25);
      --toggle-bg:     rgba(255,255,255,0.7);
      --toggle-border: rgba(46,134,222,0.40);
      --toggle-color:  #0a2540;
      --radial-a:      rgba(46,134,222,0.10);
      --radial-b:      rgba(147,197,253,0.06);
      --radial-c:      rgba(240,246,255,0);
    }

    :root {
      --blue-mid:    #0d3b7a;
      --blue-bright: #2e86de;
      --blue-glow:   #4fa3e8;
      --blue-ice:    #7ec8e3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    html, body { width: 100%; min-height: 100%; overflow-x: hidden; font-family: 'Jost', sans-serif; }
    body {
      background: var(--page-bg);
      color: var(--body-color);
      transition: background 0.45s ease, color 0.45s ease;
    }

    nav, .overlay, .lang-card, .nav-links a {
      transition: background 0.45s ease, color 0.45s ease,
                  border-color 0.45s ease, backdrop-filter 0.45s ease;
    }

    #bg-canvas { position: fixed; inset: 0; z-index: 0; width: 100%; height: 100%; will-change: transform; }
    .overlay {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(160deg, var(--overlay-a) 0%, var(--overlay-b) 50%, var(--overlay-c) 100%);
    }
    #particles { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 3rem;
      background: var(--nav-bg);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--glass-border);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem; font-weight: 600; letter-spacing: 0.12em;
      color: var(--blue-ice); text-transform: uppercase;
      text-shadow: 0 0 18px rgba(126,200,227,0.5);
      text-decoration: none;
    }
    body.light .nav-logo { color: #0d3b7a; text-shadow: 0 0 18px rgba(13,59,122,0.25); }
    .nav-right { display: flex; align-items: center; gap: 2rem; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      text-decoration: none; color: var(--text-nav);
      font-size: 0.78rem; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 300;
    }
    .nav-links a:hover { color: var(--blue-glow); }

    #themeToggle {
      display: flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--toggle-bg); border: 1px solid var(--toggle-border);
      backdrop-filter: blur(12px); cursor: pointer;
      font-size: 1.1rem; color: var(--toggle-color); flex-shrink: 0;
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.45s ease, border-color 0.45s ease;
    }
    #themeToggle:hover { transform: scale(1.12) rotate(15deg); box-shadow: 0 0 18px rgba(46,134,222,0.45); }
    #themeToggle:active { transform: scale(0.93); }

    /* PAGE WRAPPER */
    .page-wrapper {
      position: relative; z-index: 10;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 6rem 2rem 3rem;
    }

    /* HERO */
    .hero { display: flex; flex-direction: column; align-items: center; gap: 1.4rem; text-align: center; margin-bottom: 4.5rem; }

    .eyebrow {
      font-size: 0.72rem; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--blue-ice); font-weight: 300;
      opacity: 0; animation: fadeUp 0.9s ease forwards 0.2s;
    }
    body.light .eyebrow { color: #1a5fb4; }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 700; line-height: 0.95; letter-spacing: 0.05em;
      color: var(--text-primary);
      text-shadow: 0 0 40px rgba(78,163,232,0.55), 0 0 90px rgba(46,134,222,0.25), 0 4px 30px rgba(0,0,0,0.15);
      opacity: 0; animation: fadeUp 1s ease forwards 0.45s;
      position: relative; will-change: transform;
    }
    body.light .hero-title { text-shadow: 0 0 30px rgba(46,134,222,0.35), 0 2px 16px rgba(0,0,0,0.08); }
    .hero-title .line2 {
      display: block; font-style: italic; color: var(--blue-ice);
      font-size: 0.58em; letter-spacing: 0.12em;
    }
    body.light .hero-title .line2 { color: #1a5fb4; }

    .hero-divider {
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue-glow), transparent);
      opacity: 0; animation: fadeIn 1s ease forwards 0.8s;
    }

    .tagline {
      font-size: clamp(0.88rem, 2vw, 1.1rem); font-weight: 200; letter-spacing: 0.06em;
      color: var(--tagline-color); max-width: 440px; line-height: 1.75;
      opacity: 0; animation: fadeUp 1s ease forwards 0.7s;
    }
    .tagline em { font-style: italic; color: var(--blue-ice); }
    body.light .tagline em { color: #1a5fb4; }

    /* KEYBOARD HINT */
    .keyboard-hint {
      opacity: 0; animation: fadeIn 1s ease forwards 1.3s;
      display: flex; align-items: center; gap: 0.6rem;
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--hint-color); font-weight: 300;
    }
    .kbd {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 5px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      font-size: 0.72rem; font-weight: 500; color: var(--text-muted);
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    /* LANGUAGE CARDS */
    .lang-cards-wrapper {
      display: flex; gap: 2.2rem; justify-content: center; align-items: stretch;
      opacity: 0; animation: fadeUp 1s ease forwards 1s;
      flex-wrap: wrap;
    }

    .lang-card {
      position: relative; overflow: hidden;
      width: 260px; min-height: 320px;
      background: linear-gradient(145deg, var(--card-bg-a) 0%, var(--card-bg-b) 100%);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      backdrop-filter: blur(24px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; padding: 2.8rem 2rem;
      cursor: pointer;
      text-align: center;
      animation: floatY 6s ease-in-out infinite;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.35s ease,
                  border-color 0.35s ease,
                  background 0.45s ease;
      will-change: transform;
      user-select: none;
    }
    .lang-card:nth-child(2) { animation-delay: 1s; animation-duration: 7s; }

    /* Glow reflection pseudo */
    .lang-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(126,200,227,0.10) 0%, transparent 60%);
      border-radius: 28px;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .lang-card::after {
      content: '';
      position: absolute;
      top: -60%; left: -60%;
      width: 220%; height: 220%;
      background: conic-gradient(from 0deg, transparent 0%, rgba(78,163,232,0.05) 30%, transparent 60%);
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      animation: rotateSlow 8s linear infinite;
    }

    .lang-card:hover {
      transform: translateY(-14px) scale(1.04);
      box-shadow:
        0 28px 80px rgba(46,134,222,0.28),
        0 0 60px rgba(46,134,222,0.15),
        0 6px 30px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(126,200,227,0.18);
      border-color: rgba(78,163,232,0.6);
    }
    .lang-card:hover::before { opacity: 1; }
    .lang-card:hover::after { opacity: 1; }
    .lang-card:hover .card-number { color: var(--blue-glow); border-color: rgba(78,163,232,0.6); }
    .lang-card:hover .card-icon-wrap { box-shadow: 0 0 40px rgba(46,134,222,0.6), 0 0 80px rgba(46,134,222,0.2); }

    .lang-card:active { transform: scale(0.97); }

    /* Selected state */
    .lang-card.selected {
      border-color: rgba(78,163,232,0.9);
      box-shadow:
        0 0 60px rgba(46,134,222,0.5),
        0 0 120px rgba(46,134,222,0.2),
        0 20px 60px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(126,200,227,0.2);
      animation: pulseGlow 1.5s ease-in-out infinite, floatY 6s ease-in-out infinite;
    }

    .card-number {
      position: absolute; top: 1.1rem; right: 1.4rem;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem; font-weight: 600; letter-spacing: 0.15em;
      color: var(--text-faint);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      transition: color 0.3s ease, border-color 0.3s ease;
    }

    .card-icon-wrap {
      width: 72px; height: 72px; border-radius: 22px;
      background: linear-gradient(135deg, var(--blue-mid) 0%, var(--blue-bright) 60%, var(--blue-glow) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      box-shadow: 0 0 28px rgba(46,134,222,0.45), 0 4px 16px rgba(0,0,0,0.2);
      transition: box-shadow 0.35s ease;
      flex-shrink: 0;
    }

    .card-lang-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 700; letter-spacing: 0.04em;
      color: var(--text-primary); line-height: 1;
    }

    .card-lang-sub {
      font-size: 0.82rem; font-weight: 300; letter-spacing: 0.06em;
      color: var(--text-muted); line-height: 1.5;
    }

    .card-arrow {
      margin-top: 0.6rem;
      font-size: 1.1rem; color: var(--blue-glow);
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .lang-card:hover .card-arrow { opacity: 1; transform: translateX(0); }

    .card-tag {
      display: inline-block; margin-top: 0.4rem;
      font-size: 0.67rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--blue-glow);
      border: 1px solid var(--glass-border);
      border-radius: 30px; padding: 0.28rem 0.8rem;
    }
    body.light .card-tag { color: #1a5fb4; }

    /* Ripple */
    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(78,163,232,0.22);
      transform: scale(0); animation: ripple 0.7s linear;
      pointer-events: none;
    }

    /* FOOTER NOTE */
    .page-footer-note {
      margin-top: 4rem;
      font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--hint-color); font-weight: 300;
      opacity: 0; animation: fadeIn 1.2s ease forwards 1.6s;
    }

    /* KEYFRAMES */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes floatY {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }
    @keyframes ripple { to { transform: scale(5); opacity: 0; } }
    @keyframes spinPop {
      0%   { transform: scale(0.7) rotate(-30deg); opacity: 0; }
      60%  { transform: scale(1.2) rotate(8deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulseGlow {
      0%,100% { box-shadow: 0 0 60px rgba(46,134,222,0.5), 0 0 120px rgba(46,134,222,0.2), 0 20px 60px rgba(0,0,0,0.25); }
      50%      { box-shadow: 0 0 90px rgba(46,134,222,0.75), 0 0 160px rgba(46,134,222,0.35), 0 20px 60px rgba(0,0,0,0.25); }
    }
    .toggle-anim { animation: spinPop 0.32s ease forwards; }

    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.4rem; }
      .nav-links { display: none; }
      .lang-cards-wrapper { flex-direction: column; align-items: center; }
      .lang-card { width: 100%; max-width: 320px; min-height: 260px; }
      #themeToggle { width: 34px; height: 34px; font-size: 1rem; }
    }

/* INTRO OVERLAY + PAGE TRANSITION — ADD-ON STYLES ONLY   */
/* ═══════════════════════════════════════════════════════ */

/* ── INTRO OVERLAY ── */
#introOverlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #020b18 0%, #04112a 40%, #0d3b7a 80%, #020b18 100%);
  animation: introFadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  will-change: opacity, transform;
}

/* Glass noise / radial glow on overlay */
#introOverlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 55% at 50% 50%, rgba(46, 134, 222, 0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(126, 200, 227, 0.09) 0%, transparent 60%);
  pointer-events: none;
  animation: introGlowPulse 2.5s ease-in-out infinite;
}

/* ── INTRO CONTENT ── */
#introContent {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
  text-align: center;
  opacity: 0;
  transform: scale(0.88) translateY(20px);
  animation: introContentReveal 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.35s;
  will-change: opacity, transform;
}

/* ── LOGO WRAPPER (holds shimmer) ── */
#introLogoWrap {
  position: relative;
  overflow: hidden;
  padding: 0 4px;
}

/* ── SHIMMER SWEEP ── */
#introShimmer {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    105deg,
    transparent 20%,
    rgba(126, 200, 227, 0.55) 50%,
    transparent 80%
  );
  transform: translateX(-120%);
  animation: introShimmerSweep 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards 1.05s;
  pointer-events: none;
  border-radius: 4px;
}

/* ── LOGO TEXT ── */
#introLogo {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.8rem, 9vw, 6rem);
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #f0f6ff;
  text-shadow:
    0 0 40px rgba(78, 163, 232, 0.75),
    0 0 90px rgba(46, 134, 222, 0.4),
    0 4px 24px rgba(0, 0, 0, 0.25);
  display: block;
  line-height: 1;
}

/* ── DIVIDER ── */
#introDivider {
  width: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, #4fa3e8, transparent);
  animation: introLineDraw 0.7s ease forwards 0.85s;
  will-change: width;
}

/* ── TAGLINE ── */
#introTagline {
  font-family: 'Jost', sans-serif;
  font-size: clamp(0.85rem, 2.5vw, 1.05rem);
  font-weight: 200;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(126, 200, 227, 0.78);
  opacity: 0;
  transform: translateY(10px);
  animation: introTagReveal 0.7s ease forwards 1.0s;
  will-change: opacity, transform;
}

/* ── LOADING DOTS ── */
#introDots {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.4rem;
  opacity: 0;
  animation: fadeIn 0.4s ease forwards 1.3s;
}

#introDots span {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(78, 163, 232, 0.6);
  animation: introDotPulse 1s ease-in-out infinite;
}
#introDots span:nth-child(2) { animation-delay: 0.18s; }
#introDots span:nth-child(3) { animation-delay: 0.36s; }

/* ── OVERLAY EXIT ── */
#introOverlay.exiting {
  animation: introExit 0.65s cubic-bezier(0.4, 0, 1, 1) forwards !important;
  pointer-events: none;
}

/* ── PAGE TRANSITION CURTAIN ── */
#transitionCurtain {
  position: fixed;
  inset: 0;
  z-index: 8888;
  background: linear-gradient(135deg, #020b18 0%, #04112a 50%, #0d3b7a 100%);
  opacity: 0;
  pointer-events: none;
  transform: scale(1.04);
  transition: opacity 0.45s cubic-bezier(0.4, 0, 1, 1), transform 0.45s cubic-bezier(0.4, 0, 1, 1);
}

#transitionCurtain.active {
  opacity: 1;
  transform: scale(1);
  pointer-events: all;
}

/* Page body blur/fade on transition */
body.page-transitioning .page-wrapper,
body.page-transitioning nav {
  filter: blur(6px) brightness(0.7);
  transform: scale(0.97);
  opacity: 0.4;
  transition:
    filter 0.42s cubic-bezier(0.4, 0, 1, 1),
    transform 0.42s cubic-bezier(0.4, 0, 1, 1),
    opacity 0.42s cubic-bezier(0.4, 0, 1, 1);
  will-change: filter, transform, opacity;
}

/* ── INTRO KEYFRAMES ── */
@keyframes introFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes introContentReveal {
  from { opacity: 0; transform: scale(0.88) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

@keyframes introShimmerSweep {
  from { transform: translateX(-120%); }
  to   { transform: translateX(120%); }
}

@keyframes introLineDraw {
  from { width: 0; }
  to   { width: 90px; }
}

@keyframes introTagReveal {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes introDotPulse {
  0%, 100% { opacity: 0.3; transform: scale(0.85); }
  50%       { opacity: 1;   transform: scale(1.2);  }
}

@keyframes introGlowPulse {
  0%, 100% { opacity: 0.7; }
  50%       { opacity: 1.0; }
}

@keyframes introExit {
  0%   { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.06); }
}

/* Light mode: dim the overlay slightly (rare edge case on first load) */
body.light #introOverlay {
  background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 40%, #bfdbfe 80%, #dbeafe 100%);
}
body.light #introLogo {

}
body.light #introTagline { color: rgba(13, 59, 122, 0.75); }
body.light #introDots span { background: rgba(46, 134, 222, 0.55); }
body.light #transitionCurtain { background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 50%, #bfdbfe 100%); }

/* ── RESPONSIVE ── */
@media (max-width: 480px) {

    /* ── WAVE BACKGROUND ── */
    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx    = canvas.getContext('2d');
      let W, H, t = 0;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      window.addEventListener('resize', resize); resize();
      const darkWaves = [
        { amp:80,  freq:0.003,  speed:0.40, yFrac:0.55, alpha:0.07, color:'#1a5fb4' },
        { amp:55,  freq:0.004,  speed:0.60, yFrac:0.60, alpha:0.08, color:'#2e86de' },
        { amp:100, freq:0.002,  speed:0.25, yFrac:0.50, alpha:0.05, color:'#0d3b7a' },
        { amp:40,  freq:0.006,  speed:0.80, yFrac:0.65, alpha:0.06, color:'#4fa3e8' },
        { amp:70,  freq:0.0035, speed:0.50, yFrac:0.45, alpha:0.04, color:'#7ec8e3' },
      ];
      const lightWaves = [
        { amp:80,  freq:0.003,  speed:0.40, yFrac:0.55, alpha:0.10, color:'#93c5fd' },
        { amp:55,  freq:0.004,  speed:0.60, yFrac:0.60, alpha:0.12, color:'#60a5fa' },
        { amp:100, freq:0.002,  speed:0.25, yFrac:0.50, alpha:0.07, color:'#bfdbfe' },
        { amp:40,  freq:0.006,  speed:0.80, yFrac:0.65, alpha:0.08, color:'#3b82f6' },
        { amp:70,  freq:0.0035, speed:0.50, yFrac:0.45, alpha:0.05, color:'#dbeafe' },
      ];
      function isDark() { return document.body.classList.contains('dark'); }
      function draw() {
        ctx.clearRect(0,0,W,H);
        if (isDark()) {
          const g = ctx.createLinearGradient(0,0,W,H);
          g.addColorStop(0,'#020b18'); g.addColorStop(0.5,'#04112a'); g.addColorStop(1,'#020b18');
          ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
        } else {
          const g = ctx.createLinearGradient(0,0,W,H);
          g.addColorStop(0,'#dbeafe'); g.addColorStop(0.5,'#eff6ff'); g.addColorStop(1,'#dbeafe');
          ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
        }
        const waves = isDark() ? darkWaves : lightWaves;
        waves.forEach((w,i) => {
          const yBase = H * w.yFrac;
          ctx.save(); ctx.globalAlpha = w.alpha; ctx.beginPath(); ctx.moveTo(0,H);
          for (let x=0; x<=W; x+=4) {
            const y = yBase
              + Math.sin(x * w.freq + t * w.speed + i * 1.2) * w.amp
              + Math.cos(x * w.freq * 0.5 + t * w.speed * 0.7 + i) * (w.amp * 0.4);
            ctx.lineTo(x,y);
          }
          ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
          ctx.fillStyle = w.color; ctx.fill(); ctx.restore();
        });
        const radA = isDark() ? 'rgba(46,134,222,0.08)'  : 'rgba(46,134,222,0.10)';
        const radB = isDark() ? 'rgba(13,59,122,0.04)'   : 'rgba(147,197,253,0.06)';
        const radC = isDark() ? 'rgba(2,11,24,0)'        : 'rgba(240,246,255,0)';
        const grd = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*0.55);
        grd.addColorStop(0,radA); grd.addColorStop(0.5,radB); grd.addColorStop(1,radC);
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
        t += 0.012;
        requestAnimationFrame(draw);
      }
      draw();
    })();

    /* ── PARTICLES ── */
    (function () {

      const ctx    = canvas.getContext('2d');
      let W, H;

      window.addEventListener('resize', resize); resize();
      function isDark() { return document.body.classList.contains('dark'); }
      class Particle {
        constructor() { this.reset(true); }
        reset(init) {
          this.x = Math.random() * W;
          this.y = init ? Math.random() * H : H + 10;
          this.size = Math.random() * 1.8 + 0.4;
          this.speed = Math.random() * 0.4 + 0.1;
          this.opacity = Math.random() * 0.6 + 0.1;
          this.drift = (Math.random() - 0.5) * 0.3;
          this.twinkle = Math.random() * Math.PI * 2;
          this.twinkleSpeed = Math.random() * 0.03 + 0.01;
          this.hue = 190 + Math.floor(Math.random() * 40);
        }
        update() {
          this.y -= this.speed; this.x += this.drift; this.twinkle += this.twinkleSpeed;
          if (this.y < -5) this.reset(false);
        }
        draw() {
          const a = this.opacity * (0.6 + 0.4 * Math.sin(this.twinkle)) * (isDark() ? 1 : 0.5);
          ctx.save(); ctx.globalAlpha = a;
          ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
          ctx.fillStyle = `hsl(${this.hue},80%,${isDark() ? 85 : 55}%)`; ctx.fill(); ctx.restore();
        }
      }
      const particles = Array.from({length:120}, () => new Particle());
      function loop() {
        ctx.clearRect(0,0,W,H);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(loop);
      }

      function isDark() { return document.body.classList.contains('dark'); }

        cx = lerp(cx, tx, 0.07);

        left:${e.clientX - rect.left - size/2}px;
        top:${e.clientY - rect.top - size/2}px;

(function () {

  const DISMISS_AFTER = 2800;

  function dismissIntro() {

    // Remove from DOM after exit animation completes (0.65s)
    setTimeout(function () {
      overlay.remove();

(function () {
  const curtain = document.getElementById('transitionCurtain');
  if (!curtain) return;

  // Intercept the existing selectLanguage redirect
  // We patch window.location assignment via a wrapper
  const _originalSelectLanguage = window.selectLanguage;

  window.triggerPageTransition = function (href) {
    // 1. Blur + fade the page
    document.body.classList.add('page-transitioning');

    // 2. Bring in the curtain (slight delay so blur starts first)
    setTimeout(function () {
      curtain.classList.add('active');

    // 3. Navigate after transition completes
    setTimeout(function () {

(function () {

    if (e && typeof addRipple === 'function') addRipple(card, e);

    document.querySelectorAll('.lang-card').forEach(function (c) {

  if (cardEn) {

    newEn.addEventListener('keydown', function (e) {

    cardHi.parentNode.replaceChild(newHi, cardHi);
    newHi.addEventListener('click', function (e) { patchedSelect('hi', newHi, e); });
    newHi.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        patchedSelect('hi', newHi, { clientX: newHi.getBoundingClientRect().left + 130, clientY: newHi.getBoundingClientRect().top + 160 });
      }
    });
  }

  // Re-bind number keys (1 / 2)
  document.addEventListener('keydown', function (e) {
    const en = document.getElementById('card-en');
    const hi = document.getElementById('card-hi');
    if (e.key === '1' && en) {
      en.focus();
      patchedSelect('en', en, { clientX: en.getBoundingClientRect().left + 130, clientY: en.getBoundingClientRect().top + 160 });
    } else if (e.key === '2' && hi) {
      hi.focus();
      patchedSelect('hi', hi, { clientX: hi.getBoundingClientRect().left + 130, clientY: hi.getBoundingClientRect().top + 160 });
    }
  });

  // Re-apply hover tilt (lost during clone)
  [document.getElementById('card-en'), document.getElementById('card-hi')].forEach(function (card) {
    if (!card) return;
    card.addEventListener('mousemove', function (e) {
      const rect = card.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width - 0.5) * 2;
      const y = ((e.clientY - rect.top)  / rect.height - 0.5) * 2;
      card.style.transform = 'translateY(-14px) scale(1.04) rotateX(' + (-y * 4) + 'deg) rotateY(' + (x * 4) + 'deg)';
    });
    card.addEventListener('mouseleave', function () {
      card.style.transform = '';
    });
  });
})();
/* ═══════════════════════════════════════════════════════ */
  </script>
</body>
</html>
