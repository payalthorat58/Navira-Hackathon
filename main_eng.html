<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Digital Sarthi | Easy Digital Training</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shepherd.js@11.0.1/dist/css/shepherd.css" />
  <script src="https://cdn.jsdelivr.net/npm/shepherd.js@11.0.1/dist/js/shepherd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg-start:#f0f4ff; --bg-end:#e2e8f0;
      --card-bg:rgba(255,255,255,0.92); --card-border:rgba(59,130,246,0.4);
      --text-primary:#0f172a; --text-secondary:#1e293b; --text-muted:#475569;
      --nav-bg:rgba(255,255,255,0.9); --accent:#2563eb; --accent-light:#3b82f6;
      --accent-soft:#dbeafe; --progress-bg:#cbd5e1;
      --module-bg:#ffffff; --module-hover:#eff6ff;
      --phone-frame:#1e293b; --phone-screen:#f8faff;
      --shadow:0 8px 20px rgba(0,0,0,0.1);
      --step-inactive:#cbd5e1; --step-active:#2563eb;
      --important-bg:#fef3c7;
      --important-border:#f59e0b;
    }
    body.dark {
      --bg-start:#0a0f1e; --bg-end:#010101;
      --card-bg:rgba(18,25,45,0.92); --card-border:rgba(59,130,246,0.5);
      --text-primary:#f0f4ff; --text-secondary:#e2edff; --text-muted:#9bb5e6;
      --nav-bg:rgba(8,15,28,0.9); --accent:#3b82f6; --accent-soft:#1e3a8a;
      --progress-bg:#1e2a3a; --module-bg:#1e293b; --module-hover:#2d3a5e;
      --phone-frame:#111217; --phone-screen:#1a2130;
      --shadow:0 8px 20px rgba(0,0,0,0.4);
      --step-inactive:#334155;
      --important-bg:#422006;
      --important-border:#f59e0b;
    }
    body {
      font-family:'Inter',sans-serif;
      background:radial-gradient(circle at 20% 30%, var(--bg-start), var(--bg-end));
      min-height:100vh; overflow:hidden; position:fixed;
      width:100%; height:100vh; font-size:20px;
    }
    .blob {
      position:fixed; width:55vw; height:55vw;
      background:radial-gradient(circle, rgba(59,130,246,0.12), rgba(0,20,80,0));
      border-radius:50%; filter:blur(90px); z-index:-2; pointer-events:none;
      animation:floatGlow 20s infinite alternate;
    }
    @keyframes floatGlow {
      0%{transform:translate(0,0) scale(1);opacity:0.4}
      100%{transform:translate(6%,8%) scale(1.15);opacity:0.7}
    }
    .theme-toggle {
      position:fixed; bottom:20px; right:20px;
      background:var(--card-bg); backdrop-filter:blur(12px);
      border:2px solid var(--accent); border-radius:60px; padding:12px 24px;
      font-weight:700; font-size:1rem; color:var(--text-primary);
      cursor:pointer; z-index:200; display:flex; align-items:center;
      gap:10px; box-shadow:var(--shadow);
    }
    .navbar {
      backdrop-filter:blur(20px); background:var(--nav-bg);
      border-bottom:2px solid var(--accent); padding:1rem 2rem;
      display:flex; justify-content:space-between; align-items:center;
      flex-wrap:wrap; position:sticky; top:0; z-index:100;
    }
    .logo { font-weight:800; font-size:2.4rem; background:linear-gradient(135deg,var(--accent),var(--accent-light)); background-clip:text; -webkit-background-clip:text; color:transparent; }
    .level-progress {
      background:var(--module-bg); border-radius:60px; padding:0.6rem 1.2rem;
      display:flex; align-items:center; gap:1.2rem; border:2px solid var(--accent);
    }
    .progress-label { font-size:1.4rem; font-weight:600; color:var(--text-secondary); }
    .progress-bar-container { width:200px; height:12px; background:var(--progress-bg); border-radius:20px; overflow:hidden; }
    .progress-fill { width:0%; height:100%; background:linear-gradient(90deg,var(--accent),var(--accent-light)); transition:width 0.5s ease; }
    .points-badge { background:var(--accent-soft); padding:0.6rem 1.4rem; border-radius:40px; font-size:1.2rem; font-weight:700; color:var(--text-primary); }
    .user-profile {
      display:flex; align-items:center; gap:12px;
      background:var(--module-bg); padding:0.5rem 1.2rem;
      border-radius:60px; border:2px solid var(--accent); cursor:pointer;
    }
    .avatar {
      background:linear-gradient(145deg,var(--accent),var(--accent-light));
      width:45px; height:45px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:1.4rem; color:white;
    }
    .medal-icon { font-size:1.6rem; }
    .dashboard {
      display:flex; gap:1.5rem; padding:1.2rem 1.8rem;
      height:calc(100vh - 85px); overflow:hidden;
    }
    /* Left panel */
    .levels-panel {
      flex:0.9; min-width:280px; background:var(--card-bg);
      backdrop-filter:blur(14px); border-radius:2rem;
      border:2px solid var(--card-border); padding:1.2rem;
      display:flex; flex-direction:column; overflow-y:auto;
      box-shadow:var(--shadow);
    }
    .section-title {
      font-weight:800; font-size:2rem; margin-bottom:1rem;
      border-left:6px solid var(--accent); padding-left:14px;
      color:var(--text-primary);
    }
    .module-card {
      background:var(--module-bg); border-radius:1.5rem; margin-bottom:1rem;
      padding:1.4rem; cursor:pointer; border:3px solid var(--card-border);
      transition:all 0.2s; display:flex; flex-direction:column; gap:0.8rem;
    }
    .module-intro-screen {
      background:var(--card-bg); border-radius:2rem; padding:2rem;
      text-align:center; display:flex; flex-direction:column; gap:1.5rem;
      justify-content:center; min-height:300px;
    }
    .module-intro-title { font-size:2.6rem; font-weight:800; color:var(--accent); margin-bottom:1rem; }
    .module-intro-description { font-size:1.6rem; line-height:1.8; color:var(--text-secondary); margin-bottom:1rem; }
    .module-intro-icon { font-size:4rem; margin-bottom:1rem; }
    .guideline-card {
      background:white; border-radius:1.8rem; padding:2rem; margin:0.8rem;
      min-width:300px; flex-shrink:0; box-shadow:0 8px 16px rgba(0,0,0,0.1);
      display:flex; flex-direction:column; gap:1.2rem; border-left:8px solid var(--accent);
    }
    .guideline-card.warning { border-left-color:#f59e0b; }
    .guideline-card.success { border-left-color:#22c55e; }
    .guideline-type { font-size:1.2rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
    .guideline-type.do { color:#22c55e; }
    .guideline-type.dont { color:#ef4444; }
    .guideline-text { font-size:1.5rem; font-weight:600; line-height:1.6; color:#1e293b; }
    .guidelines-container {
      display:flex; overflow-x:auto; gap:1rem; padding:1.5rem 0;
    }
    .guidelines-nav {
      display:flex; gap:1rem; justify-content:center; margin-top:1.5rem;
    }
    .guidelines-nav button {
      background:var(--accent); color:white; border:none; border-radius:50px;
      padding:1rem 2rem; font-size:1.3rem; font-weight:700; cursor:pointer;
      transition:all 0.3s;
    }
    .guidelines-nav button:hover { transform:scale(1.05); }
    .module-card.active { border:3px solid var(--accent); background:var(--module-hover); }
    .module-card-header { display:flex; align-items:center; gap:1rem; }
    .module-icon {
      font-size:2rem; width:55px; height:55px; background:var(--accent-soft);
      border-radius:1rem; display:flex; align-items:center; justify-content:center;
    }
    .module-info { flex:1; }
    .module-title { font-weight:800; font-size:1.6rem; color:var(--text-primary); }
    .module-desc { font-size:1.1rem; color:var(--text-muted); }
    .module-status-badge {
      background:var(--accent-soft); padding:0.2rem 0.8rem;
      border-radius:30px; font-size:0.75rem; color:var(--accent); font-weight:700;
    }
    /* Steps chain inside module card */
    .module-steps-chain {
      display:none; padding:0.5rem 0 0.2rem 0.5rem; flex-direction:column; gap:0;
    }
    .module-card.active .module-steps-chain { display:flex; }
    .step-chain-item {
      display:flex; align-items:flex-start; gap:0.5rem; position:relative;
    }
    .step-chain-left { display:flex; flex-direction:column; align-items:center; }
    .step-dot {
      width:14px; height:14px; border-radius:50%;
      background:var(--step-inactive); flex-shrink:0; margin-top:3px;
      transition:background 0.4s;
    }
    .step-dot.done { background:#22c55e; }
    .step-dot.current { background:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,0.3); animation:pulseDot 1.2s infinite; }
    @keyframes pulseDot { 0%,100%{box-shadow:0 0 0 3px rgba(37,99,235,0.3)} 50%{box-shadow:0 0 0 6px rgba(37,99,235,0.15)} }
    .step-connector { width:2px; height:18px; background:var(--step-inactive); margin:0 auto; transition:background 0.4s; }
    .step-connector.done { background:#22c55e; }
    .step-label { font-size:0.78rem; color:var(--step-inactive); font-weight:600; padding-top:1px; transition:color 0.4s; }
    .step-label.done { color:#22c55e; }
    .step-label.current { color:var(--accent); }

    .guide-btn:hover { 
      background:linear-gradient(135deg, rgba(59,130,246,0.22), rgba(96,165,250,0.22))!important;
      border-color:rgba(59,130,246,0.4)!important;
      transform:translateY(-1px);
      box-shadow:0 4px 12px rgba(59,130,246,0.2);
    }

    /* Middle panel */
    .instruction-panel {
      flex:1.2; background:var(--card-bg); backdrop-filter:blur(14px);
      border-radius:2rem; border:2px solid var(--card-border); padding:1.5rem;
      display:flex; flex-direction:column; box-shadow:var(--shadow); overflow-y:auto;
    }
    .welcome-box {
      background:var(--accent-soft); border-radius:1.5rem;
      padding:1.5rem; text-align:center;
    }
    .welcome-box h2 { font-size:2.4rem; margin-bottom:1rem; color:var(--accent); }
    .welcome-box p { font-size:1.4rem; line-height:1.7; color:var(--text-secondary); }

    /* Right panel */
    .mobile-sim-panel {
      flex:1; min-width:300px; display:flex;
      justify-content:center; align-items:center;
    }
    .phone-frame {
      background:var(--phone-frame); border-radius:2.5rem;
      padding:12px 8px 16px 8px;
      box-shadow:0 25px 40px rgba(0,0,0,0.4); width:320px;
    }
    .phone-notch {
      width:90px; height:22px; background:var(--phone-frame);
      border-radius:0 0 16px 16px; margin:0 auto 6px auto;
    }
    .phone-screen {
      background:var(--phone-screen); border-radius:1.8rem;
      height:580px; overflow:hidden; position:relative;
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; color:var(--text-secondary);
      font-size:1rem; text-align:center;
    }
    .demo-mobile-icon { font-size:4rem; margin-bottom:1rem; }

    /* Shepherd */
    .shepherd-element { background:var(--card-bg)!important; backdrop-filter:blur(16px); border:3px solid var(--accent)!important; border-radius:2rem!important; font-family:'Inter',sans-serif!important; box-shadow:0 20px 35px rgba(0,0,0,0.3)!important; }
    .shepherd-title { font-size:1.8rem!important; font-weight:800!important; color:var(--accent)!important; }
    .shepherd-text { font-size:1.4rem!important; line-height:1.7!important; padding:1.2rem 1.8rem!important; color:var(--text-secondary)!important; }
    .shepherd-button { background:var(--accent)!important; border-radius:50px!important; font-size:1.2rem!important; font-weight:700!important; padding:0.8rem 1.6rem!important; }
    .shepherd-footer { padding:0.8rem 1.5rem 1.5rem!important; }

    /* Temp highlight ring on phone simulator */
    .sim-highlight {
      position:absolute; border-radius:12px; pointer-events:none; z-index:99;
      box-shadow:0 0 0 3px #2563eb, 0 0 16px 4px rgba(37,99,235,0.5);
      animation:simPulse 0.8s ease-in-out infinite alternate;
      transition:all 0.3s;
    }
    @keyframes simPulse {
      from{box-shadow:0 0 0 3px #2563eb, 0 0 12px 3px rgba(37,99,235,0.4)}
      to{box-shadow:0 0 0 5px #3b82f6, 0 0 22px 7px rgba(59,130,246,0.3)}
    }
    /* Arrow overlay */
    .sim-arrow {
      position:absolute; z-index:100; pointer-events:none;
      animation:arrowBounce 0.6s ease-in-out infinite alternate;
    }
    @keyframes arrowBounce { from{transform:translateY(0)} to{transform:translateY(-5px)} }

    /* Instruction card in middle panel */
    .instr-card {
      background:var(--accent-soft); border-radius:1.5rem;
      padding:1.2rem 1.5rem; margin-bottom:1rem;
      border-left:5px solid var(--accent);
    }
    .instr-card.important {
      background:var(--important-bg);
      border-left-color:var(--important-border);
    }
    .instr-card h3 { color:var(--accent); font-size:1.3rem; margin-bottom:0.5rem; }
    .instr-card.important h3 { color:var(--important-border); }
    .instr-card p { font-size:1.05rem; line-height:1.6; color:var(--text-secondary); }
    .instr-nav-btn {
      background:var(--accent); color:white; border:none;
      padding:1rem 2.4rem; border-radius:50px; font-size:1.3rem; min-height:60px;
      font-weight:700; cursor:pointer; margin-top:1rem;
      transition:transform 0.2s, background 0.2s;
    }
    .instr-nav-btn:hover { transform:scale(1.05); background:var(--accent-light); }

    /* GPay screens */
    .gpay-screen { width:100%; height:100%; display:flex; flex-direction:column; background:#f1f5fb; }
    .gpay-header { background:#4285F4; color:white; padding:18px 16px; font-size:1.3rem; font-weight:700; display:flex; align-items:center; gap:12px; }
    .gpay-body { flex:1; overflow-y:auto; padding:16px; }
    .gpay-field { background:white; border-radius:14px; padding:14px 18px; margin-bottom:14px; border:3px solid #e2e8f0; font-size:1.1rem; color:#334155; }
    .gpay-field label { font-size:1rem; font-weight:700; color:#64748b; display:block; margin-bottom:6px; }
    .gpay-field input, .gpay-field select { width:100%; border:none; outline:none; font-size:1.2rem; color:#0f172a; background:transparent; min-height:44px; }
    .gpay-btn { background:#4285F4; color:white; border:none; width:100%; padding:16px; border-radius:12px; font-size:1.3rem; font-weight:700; cursor:pointer; margin-top:8px; min-height:60px; }
    .gpay-upi-row { display:flex; gap:12px; margin-bottom:12px; }
    .gpay-upi-app { flex:1; background:white; border-radius:14px; padding:14px 10px; text-align:center; font-size:0.95rem; font-weight:600; color:#334155; border:3px solid #e2e8f0; cursor:pointer; min-height:90px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .gpay-upi-app img { width:44px; height:44px; margin-bottom:6px; }
    .gpay-pin-circle { width:18px; height:18px; border-radius:50%; background:#e2e8f0; display:inline-block; margin:0 6px; }
    .gpay-pin-circle.filled { background:#4285F4; }
    .gpay-numpad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
    .gpay-num-btn { background:white; border:3px solid #e2e8f0; border-radius:12px; padding:16px; font-size:1.8rem; font-weight:700; cursor:pointer; color:#0f172a; text-align:center; min-height:70px; }
    .gpay-num-btn:active { background:#dbeafe; border-color:#4285F4; }

    /* Jiya animation / scam call */
    .jiya-intro { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding:20px; background:#f1f5fb; }
    .jiya-avatar { width:90px; height:90px; border-radius:50%; background:linear-gradient(135deg,#f97316,#fb923c); display:flex; align-items:center; justify-content:center; font-size:3rem; margin-bottom:14px; box-shadow:0 8px 20px rgba(249,115,22,0.3); animation:jiyaPop 0.5s cubic-bezier(0.2,1.4,0.4,1) both; }
    @keyframes jiyaPop { from{transform:scale(0)} to{transform:scale(1)} }
    .jiya-name { font-size:1.3rem; font-weight:800; color:#0f172a; margin-bottom:6px; }
    .jiya-desc { font-size:0.9rem; color:#64748b; text-align:center; line-height:1.5; }

    /* Incoming call screen */
    .call-screen { display:flex; flex-direction:column; align-items:center; justify-content:space-between; height:100%; background:linear-gradient(180deg,#1e3a5f,#0f172a); padding:28px 20px 32px; color:white; }
    .call-contact { text-align:center; }
    .call-avatar { width:80px; height:80px; border-radius:50%; background:#ef4444; display:flex; align-items:center; justify-content:center; font-size:2.5rem; margin:0 auto 10px; animation:ringPulse 1s infinite; }
    @keyframes ringPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)} 50%{box-shadow:0 0 0 14px rgba(239,68,68,0)} }
    .call-label { font-size:0.85rem; color:#94a3b8; margin-bottom:4px; }
    .call-name { font-size:1.4rem; font-weight:800; }
    .call-actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; }
    .call-btn { padding:13px; border-radius:14px; font-size:0.85rem; font-weight:700; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px; }
    .call-btn i { font-size:1.4rem; }
    .call-btn.pickup { background:#22c55e; color:white; }
    .call-btn.decline { background:#ef4444; color:white; }
    .call-btn.ignore { background:#64748b; color:white; }
    .call-btn.nothing { background:#1e293b; color:#94a3b8; border:2px solid #334155; }

    /* Active call screen */
    .active-call { display:flex; flex-direction:column; align-items:center; justify-content:space-between; height:100%; background:linear-gradient(180deg,#f8fafc,#f1f5fb); padding:28px 20px 28px; color:#0f172a; }
    .active-call-opts { display:flex; flex-direction:column; gap:12px; width:100%; }
    .active-call-opt-btn { padding:14px 16px; border-radius:14px; font-size:1rem; font-weight:700; border:3px solid #e2e8f0; cursor:pointer; text-align:left; background:white; color:#1e293b; transition:all 0.3s; min-height:54px; display:flex; align-items:center; }
    .active-call-opt-btn:hover { border-color:#3b82f6; background:#dbeafe; transform:translateX(4px); }
    .active-call-opt-btn.safe { background:#dcfce7; color:#15803d; border-color:#22c55e; }
    .active-call-opt-btn.danger { background:#fee2e2; color:#991b1b; border-color:#ef4444; }
    .quiz-option-btn {
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      border: 3px solid #e2e8f0;
      cursor: pointer;
      text-align: left;
      background: white;
      color: #1e293b;
      transition: all 0.3s;
      min-height: 58px;
      display: flex;
      align-items: center;
    }
    
    .quiz-option-btn:hover {
      background: #dbeafe;
      border-color: #3b82f6;
      transform: translateX(4px);
    }
    
    .neutral-btn {
      background: white !important;
      border-color: #e2e8f0 !important;
      color: #1e293b !important;
    }

    /* Result screens */
    .result-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding:20px; text-align:center; }
    .result-screen.warning { background:linear-gradient(180deg,#7f1d1d,#450a0a); color:white; }
    .result-screen.success { background:linear-gradient(180deg,#064e3b,#022c22); color:white; }
    .result-icon { font-size:4rem; margin-bottom:12px; animation:jiyaPop 0.5s cubic-bezier(0.2,1.4,0.4,1) both; }
    .result-title { font-size:1.5rem; font-weight:800; margin-bottom:8px; }
    .result-desc { font-size:0.9rem; line-height:1.5; opacity:0.9; margin-bottom:16px; }
    .result-continue-btn { background:white; color:#0f172a; border:none; padding:12px 28px; border-radius:50px; font-size:1rem; font-weight:700; cursor:pointer; }

    /* confetti particle */
    .confetti-particle {
      position:absolute; width:8px; height:8px; border-radius:2px;
      animation:confettiFall 1.5s ease-in forwards;
    }
    .otp-popup {
      position:absolute;
      top:18px;
      left:50%;
      transform:translateX(-50%) translateY(-20px);
      width:88%;
      max-width:280px;
      background:rgba(15,23,42,0.95);
      color:white;
      border-radius:18px;
      padding:14px 16px;
      box-shadow:0 18px 40px rgba(0,0,0,0.24);
      opacity:0;
      z-index:101;
      font-size:0.95rem;
      animation:otpSlide 0.4s forwards;
      line-height:1.4;
    }
    @keyframes otpSlide {
      to { opacity:1; transform:translateX(-50%) translateY(0); }
    }
    @keyframes confettiFall {
      0%{transform:translateY(-20px) rotate(0deg);opacity:1}
      100%{transform:translateY(200px) rotate(720deg);opacity:0}
    }

    .security-tip {
      background:linear-gradient(135deg, #fef3c7, #ffedd5);
      border:2px solid #f59e0b;
      border-radius:12px;
      padding:12px 16px;
      margin-top:12px;
      font-size:0.9rem;
      color:#92400e;
    }
    .security-tip i {
      color:#f59e0b;
      margin-right:8px;
    }

    .input-highlight {
      border-color: #2563eb !important;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.2) !important;
    }

    @media (max-width:1000px) {
      body{overflow-y:auto;position:relative;height:auto}

<body>
<div class="blob" style="top:-15%;left:-15%;"></div>

<nav class="navbar">
  <div class="logo"><i class="fas fa-shield-alt"></i> Digital Sarthi</div>
  <div class="level-progress" id="progressSection">

<div class="dashboard">
  <div class="levels-panel" id="modulesPanel">
    <div class="section-title"><i class="fas fa-cubes"></i> Training Modules</div>
    <div id="modulesContainer"></div>
  </div>

  <div class="instruction-panel" id="instructionPanel">
    <div class="welcome-box" id="welcomeBox">
      <i class="fas fa-hands-helping" style="font-size:3rem;color:var(--accent);"></i>
      <h2>Welcome to Digital Training</h2>
      <p>👋 This guided tour will help you understand everything.<br>Follow the steps and earn 100 points!</p>
      <button id="startTourBtn" style="margin-top:1rem;background:var(--accent);color:white;border:none;padding:12px 28px;border-radius:50px;font-size:1.1rem;font-weight:bold;cursor:pointer;">▶ Start Guided Tour</button>
    </div>
    <div id="dynamicInstruction" style="display:none;"></div>
  </div>

  <div class="mobile-sim-panel" id="mobilePanel">
    <div class="phone-frame">
      <div class="phone-notch"></div>
      <div class="phone-screen" id="phoneScreen">
        <i class="fas fa-mobile-alt demo-mobile-icon"></i>
        <h3>📱 Mobile Simulator</h3>
        <p>Click on a module to start<br>learning step by step!</p>
      </div>
    </div>
  </div>
</div>

<script>
// ===================== DATA =====================
const modulesList = [
  { id:0, name:"Learn Google Pay", icon:"fab fa-google-pay", color:"#4285F4", points:20 },
  { id:1, name:"Learn DigiLocker",  icon:"fas fa-folder-open", color:"#3b82f6", points:20 },
  { id:2, name:"Learn UIDAI",        icon:"fas fa-id-card",    color:"#f97316", points:20 },
  { id:3, name:"Learn Email",        icon:"fas fa-envelope",   color:"#ea4335", points:20 },
  { id:4, name:"Learn Phishing Safety", icon:"fas fa-fish",   color:"#ef4444", points:20 }
];

// GPay steps: each step has a title and array of instructions
// Added 'important' flag and 'securityTips' for important steps
const gpaySteps = [
  {
    id:"download",
    title:"Download Google Pay",
    instructions:[
      { text:"Open the Play Store on your phone.", highlight:"playstore-icon", arrowDir:"down", action:"click" },
      { text:"Tap the search bar at the top.", highlight:"search-bar", arrowDir:"down", action:"click" },
      { text:"Type 'Google Pay' and press Search.", highlight:"search-bar", arrowDir:"down", action:"type", value:"Google Pay" },
      { text:"Tap 'Install' next to the Google Pay app.", highlight:"install-btn", arrowDir:"right", action:"click" }
    ],
    screen:"download"
  },
  {
    id:"create-account",
    title:"Create Your GPay Account",
    instructions:[
      { text:"Open the Google Pay app after installing.", highlight:"gpay-app-icon", arrowDir:"down", action:"click" },
      { text:"Enter your mobile number linked to your bank.", highlight:"phone-input", arrowDir:"right", action:"type", value:"9876543210" },
      { text:"You'll receive an OTP (One Time Password). Enter it to verify.", highlight:"otp-input", arrowDir:"right", important:true, guidelines:["🔒 OTP is confidential. Never share it with anyone!", "🏦 Banks will never ask for your OTP over call or SMS.", "⏰ OTP is valid for only a few minutes."], action:"type", value:"123456" },
      { text:"Agree to the Terms & Conditions and tap 'Continue'.", highlight:"continue-btn", arrowDir:"down", action:"click" }
    ],
    screen:"create-account"
  },
  {
    id:"link-bank",
    title:"Link Your Bank Account",
    instructions:[
      { text:"On the home screen, tap your profile icon at the top right.", highlight:"profile-icon", arrowDir:"left", action:"click" },
      { text:"Select 'Bank Account' from the menu.", highlight:"bank-menu", arrowDir:"right", action:"click" },
      { text:"Choose your bank from the list.", highlight:"bank-list", arrowDir:"down", action:"click" },
      { text:"GPay will automatically detect your registered mobile number and verify your account.", highlight:"verify-btn", arrowDir:"down", action:"click" },
      { text:"Your bank account is now successfully linked!", highlight:"success-msg", arrowDir:"down", action:"wait" }
    ],
    screen:"link-bank"
  },
  {
    id:"upi-pin",
    title:"Set Up Your UPI PIN",
    instructions:[
      { text:"Go to 'Bank Account' settings and tap 'Set UPI PIN'.", highlight:"set-pin-btn", arrowDir:"right", action:"click" },
      { text:"Enter the last 6 digits of your debit card number.", highlight:"card-input", arrowDir:"right", action:"type", value:"123456" },
      { text:"Enter the expiry date of your debit card.", highlight:"expiry-input", arrowDir:"right", action:"type", value:"12/28" },
      { text:"Create a 6-digit UPI PIN that only you will remember.", highlight:"pin-circles", arrowDir:"down", important:true, guidelines:["🔐 Never write down your PIN anywhere.", "🚫 Don't share your PIN with anyone, not even bank employees.", "👀 Make sure no one is watching when you enter your PIN.", "🔑 Choose a PIN that's hard to guess (avoid 123456, birthdate, etc.).", "⚠️ This PIN will be required for every transaction."], action:"numpad", value:"123456" },
      { text:"Confirm your PIN by entering it again.", highlight:"confirm-pin", arrowDir:"down", action:"numpad", value:"123456" }
    ],
    screen:"upi-pin"
  }
];

let modules = modulesList.map(m => ({ ...m, completed:false, currentStep:0, currentInstr:0 }));
let totalPoints = 0;
let currentModuleId = null;
let currentScreenHighlight = null;

const gpayState = {
  installed:false,
  phoneNumber:'',
  otpSent:false,
  otpCode:'',
  otpVerified:false,
  selectedBank:'SBI',
  upiPin:'',
  payRecipient:'',
  payAmount:'',
  payNote:'',
  searchText:'',
  actionCompleted:false,
  showingModuleIntro:false,
  showingGuidelineCards:false,
  currentGuidelineCardIndex:0
};

// ===================== UI UPDATE =====================

// Module introductions
const moduleIntros = {
  download: {
    title: "📱 Download Google Pay",
    description: "Google Pay is a secure way to send money online to family and friends, or pay bills without visiting a bank.",
    icon: "📱"
  },
  create_account: {
    title: "👤 Create Your Google Pay Account",
    description: "Set up your account safely with your mobile number and a secure One-Time Password (OTP).",
    icon: "👤"
  },
  link_bank: {
    title: "🏦 Link Your Bank Account",
    description: "Connect your bank account to Google Pay so you can send and receive money securely.",
    icon: "🏦"
  },
  upi_pin: {
    title: "🔐 Set Your Security PIN",
    description: "Create a personal security code that only you know. This PIN protects all your transactions.",
    icon: "🔐"
  }
};

function showModuleIntro(stepIndex) {
  const step = gpaySteps[stepIndex];
  const intro = moduleIntros[step.id] || { title: step.title, description: "Let's learn this module!", icon: "📍" };
  
  document.getElementById('welcomeBox').style.display = 'none';
  const di = document.getElementById('dynamicInstruction');
  di.style.display = 'block';
  
  di.innerHTML = `
    <div class="module-intro-screen">
      <div class="module-intro-icon">${intro.icon}</div>
      <div class="module-intro-title">${intro.title}</div>
      <div class="module-intro-description">${intro.description}</div>
      <button class="instr-nav-btn" onclick="skipModuleIntro(${stepIndex})" style="margin-top:1.5rem;min-height:60px;font-size:1.3rem;">
        Let's Begin →
      </button>
    </div>
  `;

  document.getElementById('phoneScreen').innerHTML = `
    <div class="gpay-screen" style="display:flex;align-items:center;justify-content:center;font-size:2rem;color:#cbd5e1;">
      <div style="text-align:center;">
        <div style="font-size:4rem;margin-bottom:1rem;">${intro.icon}</div>
        <div style="font-weight:700;color:#64748b;">Get ready to learn</div>
      </div>
    </div>
  `;
}

function skipModuleIntro(stepIndex) {
  gpayState.showingModuleIntro = false;
  const mod = modules[0];
  mod.currentStep = stepIndex;
  mod.currentInstr = 0;
  showGpayStep(stepIndex, 0);
}

function showGuidelineFlashcards(guidelines, stepIndex, instrIndex) {
  gpayState.showingGuidelineCards = true;
  gpayState.currentGuidelineCardIndex = 0;
  
  const guidelineCards = guidelines.map(g => {
    const isWarning = g.startsWith('🚫') || g.startsWith('⚠️') || g.startsWith('🔐') || g.startsWith('🚫');
    return {
      text: g,
      type: isWarning ? 'dont' : 'do'
    };
  });

  function renderGuidelineCard(index) {
    if (index >= guidelineCards.length) {
      gpayState.showingGuidelineCards = false;
      return;
    }

    const card = guidelineCards[index];
    const nextBtn = index < guidelineCards.length - 1 
      ? `<button class="instr-nav-btn" onclick="nextGuidelineCard(${stepIndex}, ${instrIndex})" style="margin-top:1rem;">Next Card →</button>`
      : `<button class="instr-nav-btn" onclick="continueFromGuidelines(${stepIndex}, ${instrIndex})" style="margin-top:1rem;background:#22c55e;">Got It! Let's Continue →</button>`;

    const di = document.getElementById('dynamicInstruction');
    di.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center;">
        <div style="font-size:3rem;margin-bottom:1rem;">${card.text.split(' ')[0]}</div>
        <div class="guideline-type ${card.type}" style="margin-bottom:1rem;">${card.type === 'do' ? '✓ DO THIS' : '✗ DON\'T DO THIS'}</div>
        <div class="guideline-text" style="margin-bottom:2rem;font-size:1.4rem;">${card.text}</div>
        <div style="font-size:0.95rem;color:#94a3b8;margin-bottom:1.5rem;">Card ${index+1} of ${guidelineCards.length}</div>
        ${nextBtn}
      </div>
    `;
  }

  renderGuidelineCard(0);
}

function nextGuidelineCard(stepIndex, instrIndex) {
  gpayState.currentGuidelineCardIndex++;
  const step = gpaySteps[stepIndex];
  const instr = step.instructions[instrIndex];
  showGuidelineFlashcards(instr.guidelines, stepIndex, instrIndex);
}

function continueFromGuidelines(stepIndex, instrIndex) {
  gpayState.showingGuidelineCards = false;
  gpayState.currentGuidelineCardIndex = 0;
  showGpayStep(stepIndex, instrIndex);
}

function updateGlobalUI() {
  document.getElementById('totalPoints').innerText = totalPoints;
  document.getElementById('globalProgressFill').style.width = (totalPoints) + "%";
  let medal = "⚪";
  if (totalPoints >= 80) medal = "🥇 GOLD";
  else if (totalPoints >= 50) medal = "🥈 SILVER";
  else if (totalPoints >= 20) medal = "🥉 BRONZE";
  document.getElementById('medalDisplay').innerHTML = medal;
}

function renderModules() {
  const container = document.getElementById('modulesContainer');
  container.innerHTML = '';
  modules.forEach(mod => {
    const isActive = currentModuleId === mod.id;
    const steps = mod.id === 0 ? gpaySteps : [];

    const card = document.createElement('div');
    card.className = `module-card ${isActive ? 'active' : ''}`;
    card.setAttribute('data-module-id', mod.id);

    let stepsHtml = '';
    if (mod.id === 0) {
      stepsHtml = `<div class="module-steps-chain">`;
      steps.forEach((step, si) => {
        const isDone = mod.currentStep > si || mod.completed;
        const isCurrent = mod.currentStep === si && isActive;
        const dotClass = isDone ? 'done' : (isCurrent ? 'current' : '');
        const labelClass = isDone ? 'done' : (isCurrent ? 'current' : '');
        const connClass = isDone ? 'done' : '';
        stepsHtml += `
          <div class="step-chain-item">
            <div class="step-chain-left">
              <div class="step-dot ${dotClass}"></div>
              ${si < steps.length-1 ? `<div class="step-connector ${connClass}"></div>` : ''}
            </div>
            <span class="step-label ${labelClass}">${step.title}</span>
          </div>`;
      });
      stepsHtml += `
        <div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(59,130,246,0.15);display:flex;flex-direction:column;gap:8px;">
          <button class="guide-btn" onclick="event.stopPropagation(); showBankingGuidelines()" style="background:linear-gradient(135deg, rgba(147,197,253,0.12), rgba(191,219,254,0.12));border:1px solid rgba(59,130,246,0.25);color:#0c4a6e;padding:8px 12px;font-size:0.9rem;margin:0;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(10px);">
            <i class="fas fa-book" style="margin-right:6px;"></i>Banking Guideline
          </button>
          <button class="guide-btn" onclick="event.stopPropagation(); startJiyaSequence()" style="background:linear-gradient(135deg, rgba(96,165,250,0.15), rgba(147,197,253,0.15));border:1px solid rgba(59,130,246,0.3);color:#0c4a6e;padding:8px 12px;font-size:0.9rem;margin:0;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(10px);">
            <i class="fas fa-user-circle" style="margin-right:6px;"></i>Help Jiya
          </button>
        </div>
      `;
      stepsHtml += `</div>`;
    }

    const status = mod.completed ? '✓ Completed' : (mod.id === 0 && mod.currentStep > 0 ? `Step ${mod.currentStep+1}/${gpaySteps.length}` : 'Tap to begin');
    card.innerHTML = `
      <div class="module-card-header">
        <div class="module-icon" style="background:${mod.color}20;color:${mod.color};"><i class="${mod.icon}"></i></div>
        <div class="module-info">
          <div class="module-title">${mod.name}</div>
          <div class="module-desc">${status}</div>
        </div>
        <div class="module-status-badge">${mod.completed ? '✓' : mod.points+' pts'}</div>
      </div>
      ${stepsHtml}
    `;
    card.onclick = () => openModule(mod.id);
    container.appendChild(card);
  });
}

// ===================== OPEN MODULE =====================
function openModule(modId) {
  currentModuleId = modId;
  renderModules();
  const mod = modules[modId];
  if (modId === 0) {
    // Show module intro if starting a new step
    if (mod.currentInstr === 0) {
      showModuleIntro(mod.currentStep);
    } else {
      showGpayStep(mod.currentStep, mod.currentInstr);
    }
  } else {
    showComingSoon(mod);
  }
}

function showComingSoon(mod) {
  document.getElementById('welcomeBox').style.display = 'none';
  document.getElementById('dynamicInstruction').style.display = 'block';
  document.getElementById('dynamicInstruction').innerHTML = `
    <div class="instr-card">
      <h3><i class="${mod.icon}" style="color:${mod.color}"></i> ${mod.name}</h3>
      <p>This module is coming soon! Stay tuned for interactive lessons.</p>
    </div>`;
  document.getElementById('phoneScreen').innerHTML = `
    <i class="${mod.icon}" style="font-size:4rem;margin-bottom:1rem;color:${mod.color};"></i>
    <h3>${mod.name}</h3>
    <p style="font-size:0.9rem;color:var(--text-muted);">Coming soon!</p>`;
}

// ===================== GPAY FLOW =====================
function showGpayStep(stepIndex, instrIndex) {
  const mod = modules[0];
  mod.currentStep = stepIndex;
  mod.currentInstr = instrIndex;
  renderModules();

  const step = gpaySteps[stepIndex];
  const instr = step.instructions[instrIndex];
  
  // If this has important guidelines and we haven't shown them yet, show flashcards first
  if (instr.important && instr.guidelines && instr.guidelines.length > 0 && !gpayState.showingGuidelineCards) {
    showGuidelineFlashcards(instr.guidelines, stepIndex, instrIndex);
    return;
  }

  const isLastInstr = instrIndex === step.instructions.length - 1;
  const isLastStep = stepIndex === gpaySteps.length - 1;

  // Reset action state - button starts DISABLED
  gpayState.actionCompleted = false;

  // Instruction panel
  document.getElementById('welcomeBox').style.display = 'none';
  const di = document.getElementById('dynamicInstruction');
  di.style.display = 'block';

  const progressDots = step.instructions.map((_, i) =>
    `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 3px;background:${i===instrIndex?'var(--accent)':'var(--progress-bg)'}"></span>`
  ).join('');

  di.innerHTML = `
    <div class="instr-card">
      <h3 style="font-size:1.6rem;">📍 Step ${stepIndex+1} of ${gpaySteps.length}: ${step.title}</h3>
      <p style="font-size:1.3rem;line-height:1.7;">"${instr.text}"</p>
      ${instr.important ? `<div style="background:#fef3c7;border-left:6px solid #f59e0b;padding:14px;border-radius:8px;margin-top:12px;margin-bottom:12px;">
        <div style="font-weight:700;color:#92400e;margin-bottom:8px;font-size:1.1rem;">⚠️ Important Guidelines:</div>
        ${instr.guidelines ? instr.guidelines.map(g => `<div style="color:#92400e;font-size:1rem;margin-bottom:6px;line-height:1.5;font-weight:500;">${g}</div>`).join('') : ''}
      </div>` : ''}
      <p style="color:#ef4444;margin-top:10px;font-weight:700;font-size:1.1rem;"><i class="fas fa-hand-pointer"></i> Perform action on your phone →</p>
      <div style="margin-top:0.8rem;">${progressDots}</div>
    </div>
    <div style="display:flex;gap:1rem;flex-wrap:wrap;">

            ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(n=>`<button class="gpay-num-btn" data-key="${n}">${n}</button>`).join('')}
          </div>

    }
  }
  // SEND MONEY STEP
  else if (screen === 'send-money') {
    html = `
    <div class="gpay-screen">
      <div class="gpay-header"><i class="fas fa-paper-plane"></i> New Payment</div>
      <div class="gpay-body">
        <button id="new-payment-btn" class="gpay-btn" style="background:#22c55e;margin-bottom:12px;">+ New Payment</button>
        <div id="recipient-input" class="gpay-field"><label>UPI ID or Mobile Number</label><input type="text" id="recipient-input-field" placeholder="name@upi or 98765XXXXX" /></div>
        <div id="amount-input" class="gpay-field"><label>Amount (₹)</label><input type="number" id="amount-input-field" placeholder="0.00" /></div>
        <div id="note-input" class="gpay-field"><label>Note (optional)</label><input type="text" id="note-input-field" placeholder="For groceries..." /></div>
        <button id="pay-btn" class="gpay-btn">Pay Now</button>
        <div id="pin-input" class="gpay-field" style="margin-top:10px;"><label>Enter UPI PIN</label><div style="text-align:center;">${Array(6).fill('<span class="gpay-pin-circle"></span>').join('')}</div></div>
      </div>
    </div>`;
  }

  ps.innerHTML = html;
  initGpayInteractions(screen, stepIndex, instrIndex);
}

function initGpayInteractions(screen, stepIndex, instrIndex) {
  const ps = document.getElementById('phoneScreen');
  if (!ps) return;

   if (screen === 'download') {
    // Step 0: Home screen - Click Play Store
    const homePlayStore = document.getElementById('home-playstore');
    if (homePlayStore && instrIndex === 0) {
      homePlayStore.addEventListener('click', () => {
        homePlayStore.style.transform = 'scale(0.9)';
        setTimeout(() => {
          homePlayStore.style.transform = 'scale(1)';
          enableNextButton();
        }, 200);
      });
    }
    
    // Step 1: Play Store - Click search bar
    const searchBar = document.getElementById('search-bar');
    if (searchBar && instrIndex === 1) {
      searchBar.addEventListener('click', () => {
        searchBar.style.borderColor = '#2563eb';
        enableNextButton();
      });
    }
    
    // Step 2: Play Store - Type and click Search
    const searchInput = document.querySelector('#search-input-field');
    const searchBtn = document.getElementById('search-btn');
    if (searchInput && instrIndex === 2) {
      searchInput.focus();
      
      searchInput.addEventListener('input', (e) => {
        gpayState.searchText = e.target.value;
      });
      
      searchBtn?.addEventListener('click', () => {
        if (gpayState.searchText.toLowerCase().includes('google pay') || gpayState.searchText.toLowerCase().includes('pay')) {
          searchBtn.textContent = 'Searching...';
          searchBtn.disabled = true;
          setTimeout(() => {
            enableNextButton();
          }, 500);
        } else {
          alert('Please type "Google Pay" in the search box');
        }
      });
    }
    
    // Step 3: Play Store - Click Install button
    const installBtn = document.getElementById('install-btn');
    if (installBtn && instrIndex === 3) {
      installBtn.addEventListener('click', () => {
        if (gpayState.installed) return;
        gpayState.installed = true;
        installBtn.textContent = 'Installing...';
        installBtn.disabled = true;
        setTimeout(() => {
          installBtn.textContent = 'Installed ✓';
          installBtn.style.background = '#22c55e';
          enableNextButton();
        }, 900);
      });
    }
  }
  else if (screen === 'create-account') {
    // Handle home screen click
    const homeGpay = document.getElementById('home-gpay');
    if (homeGpay && instrIndex === 0) {
      homeGpay.addEventListener('click', () => {
        homeGpay.parentElement.style.transform = 'scale(0.9)';
        setTimeout(() => {
          homeGpay.parentElement.style.transform = 'scale(1)';
          enableNextButton();
        }, 200);
      });
    }
    
    // Handle account creation screen
    const phoneInput = document.querySelector('#phone-input-field');
    const otpInput = document.querySelector('#otp-input-field');
    const continueBtn = document.getElementById('continue-btn');
    const getOtpBtn = document.getElementById('get-otp-btn');

    if (phoneInput && instrIndex === 1) {
      phoneInput.readOnly = false;
      phoneInput.value = gpayState.phoneNumber;
      phoneInput.focus();
      
      phoneInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/[^0-9]/g, '');
        if (value.length > 10) value = value.slice(0, 10);
        e.target.value = value;
        gpayState.phoneNumber = value;
        
        // Enable button when 10 digits entered
        if (value.length === 10) {
          enableNextButton();
        }
      });
    }

    // Handle Get OTP button
    if (getOtpBtn && instrIndex === 2) {
      getOtpBtn.addEventListener('click', () => {
        // Generate random 6-digit OTP
        const otp = Math.floor(100000 + Math.random() * 900000).toString();
        gpayState.otpCode = otp;
        gpayState.otpSent = true;
        
        // Update button
        getOtpBtn.textContent = 'OTP Sent ✓';
        getOtpBtn.style.background = '#22c55e';
        getOtpBtn.disabled = true;
        
        // Enable OTP input field
        otpInput.removeAttribute('readonly');
        otpInput.readOnly = false;
        otpInput.focus();
        
        // Show OTP popup with the code
        showOtpPopup(`Your OTP is: <strong style="font-size:1.3rem;letter-spacing:2px;">${otp}</strong>`);
        
        // Show Shepherd highlight for OTP input
        showActionHighlight(1, 2, {text: 'Enter the OTP you received'});
      });
    }

    if (otpInput && instrIndex === 2) {
      otpInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/[^0-9]/g, '');
        if (value.length > 6) value = value.slice(0, 6);
        e.target.value = value;
        gpayState.otpCode = value;
        
        // Enable button when 6 digits entered
        if (value.length === 6) {
          enableNextButton();
        }
      });
    }

    // Handle Terms & Conditions checkbox for instruction 3
    if (instrIndex === 3) {
      const termsCheckbox = document.getElementById('terms-agree');
      const continueBtnTerms = document.getElementById('continue-btn');
      
      if (termsCheckbox && continueBtnTerms) {
        termsCheckbox.addEventListener('change', (e) => {
          if (e.target.checked) {
            continueBtnTerms.disabled = false;
            continueBtnTerms.style.opacity = '1';
            continueBtnTerms.style.cursor = 'pointer';
          } else {
            continueBtnTerms.disabled = true;
            continueBtnTerms.style.opacity = '0.5';
            continueBtnTerms.style.cursor = 'not-allowed';
          }
        });
        
        continueBtnTerms.addEventListener('click', () => {
          if (termsCheckbox.checked) {
            gpayState.otpVerified = true;
            continueBtnTerms.textContent = 'Verified ✓';
            continueBtnTerms.style.background = '#22c55e';
            removeOtpPopup();
            enableNextButton();
          }
        });
      }
    }
    
    continueBtn?.addEventListener('click', () => {
      if (instrIndex === 1) {
        if (gpayState.phoneNumber.length === 10) {
          enableNextButton();
        }
      }
    });
  }
  else if (screen === 'link-bank') {
    const profileIcon = document.getElementById('profile-icon');
    const bankMenu = document.getElementById('bank-menu');
    const bankItems = ps.querySelectorAll('.bank-item');
    const verifyBtn = document.getElementById('verify-btn');
    const doneBtn = document.getElementById('done-btn');
    
    if (instrIndex === 0) {
      profileIcon?.addEventListener('click', () => {
        enableNextButton();
      });
    }
    else if (instrIndex === 1) {
      bankMenu?.addEventListener('click', () => {
        enableNextButton();
      });
    }
    else if (instrIndex === 2) {
      bankItems.forEach(item => {
        item.addEventListener('click', () => {
          bankItems.forEach(i => i.style.borderColor = '#e2e8f0');
          item.style.borderColor = '#2563eb';
          gpayState.selectedBank = item.dataset.bank;
          enableNextButton();
        });
      });
    }
    else if (instrIndex === 3) {
      verifyBtn?.addEventListener('click', () => {
        verifyBtn.textContent = 'Linking...';
        verifyBtn.disabled = true;
        setTimeout(() => {
          enableNextButton();
        }, 900);
      });
    }
    else if (instrIndex === 4) {
      doneBtn?.addEventListener('click', () => {
        enableNextButton();
      });
    }
  }  else if (screen === 'upi-pin') {
    const setPinBtn = document.getElementById('set-pin-btn');
    const cardInput = document.querySelector('#card-input-field');
    const expiryInput = document.querySelector('#expiry-input-field');
    let debitCardNumber = '';
    let expiryDate = '';
    
    // Track card and expiry validation
    let isCardValid = false;
    let isExpiryValid = false;
    
    // Handle Set PIN button (instrIndex === 0)
    if (setPinBtn && instrIndex === 0) {
      setPinBtn.addEventListener('click', () => {
        enableNextButton();
      });
    }
    
    // Handle Card Input (instrIndex === 1)
if (cardInput && instrIndex === 1) {
  // Create a container for card input with verify button
  const cardContainer = cardInput.closest('.gpay-field');
  if (cardContainer && !document.getElementById('verify-card-btn')) {
    // Add a verify button below card input
    const verifyBtn = document.createElement('button');
    verifyBtn.id = 'verify-card-btn';
    verifyBtn.className = 'gpay-btn';
    verifyBtn.textContent = '✓ Verify Debit Card';
    verifyBtn.style.marginTop = '12px';
    verifyBtn.style.background = '#64748b';
    verifyBtn.style.cursor = 'not-allowed';
    verifyBtn.disabled = true;
    cardContainer.parentNode.insertBefore(verifyBtn, cardContainer.nextSibling);
  }
  
  cardInput.focus();
  
  // Remove any existing value
  cardInput.value = '';
  debitCardNumber = '';
  isCardValid = false;
  
  cardInput.addEventListener('input', (e) => {
    let value = e.target.value.replace(/[^0-9]/g, '');
    if (value.length > 6) value = value.slice(0, 6);
    e.target.value = value;
    debitCardNumber = value;
    const verifyBtn = document.getElementById('verify-card-btn');
    
    if (value.length === 6) {
      // Enable verify button
      if (verifyBtn) {
        verifyBtn.disabled = false;
        verifyBtn.style.background = '#22c55e';
        verifyBtn.style.cursor = 'pointer';
        verifyBtn.textContent = '✓ Verify Card';
      }
      // Show visual feedback
      cardInput.style.borderColor = '#22c55e';
      cardInput.style.boxShadow = '0 0 0 2px rgba(34,197,94,0.2)';
    } else {
      if (verifyBtn) {
        verifyBtn.disabled = true;
        verifyBtn.style.background = '#64748b';
        verifyBtn.style.cursor = 'not-allowed';
        verifyBtn.textContent = '✓ Verify Debit Card';
      }
      cardInput.style.borderColor = '#e2e8f0';
      cardInput.style.boxShadow = 'none';
      isCardValid = false;
    }
  });
  
  // Add click handler for verify button
  const verifyCardBtn = document.getElementById('verify-card-btn');
  if (verifyCardBtn) {
    verifyCardBtn.addEventListener('click', () => {
      if (debitCardNumber.length === 6) {
        isCardValid = true;
        
        // Show success message
        showOtpPopup('✅ Debit card verified! Now enter expiry date.', false);
        setTimeout(() => removeOtpPopup(), 2000);
        
        // Disable verify button after verification
        verifyCardBtn.disabled = true;
        verifyCardBtn.style.background = '#22c55e';
        verifyCardBtn.textContent = '✓ Verified';
        
        // Add green checkmark next to card input
        const checkmark = document.createElement('i');
        checkmark.className = 'fas fa-check-circle';
        checkmark.style.color = '#22c55e';
        checkmark.style.position = 'absolute';
        checkmark.style.right = '12px';
        checkmark.style.top = '50%';
        checkmark.style.transform = 'translateY(-50%)';
        checkmark.style.fontSize = '1.2rem';
        
        // Remove any existing checkmark
        const oldCheck = cardContainer.querySelector('.fa-check-circle');
        if (oldCheck) oldCheck.remove();
        
        cardContainer.style.position = 'relative';
        cardContainer.appendChild(checkmark);
        
        // IMMEDIATELY enable the Next button
        enableNextButton();
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
          nextBtn.textContent = '✓ Continue to Expiry →';
        }
        
        // Auto-advance to expiry field after 1 second
        setTimeout(() => {
          const expiryField = document.querySelector('#expiry-input-field');
          if (expiryField) {
            // Scroll to expiry field
            expiryField.scrollIntoView({ behavior: 'smooth', block: 'center' });
            expiryField.focus();
            // Add highlight to expiry field
            expiryField.classList.add('input-highlight');
            setTimeout(() => {
              expiryField.classList.remove('input-highlight');
            }, 1000);
          }
        }, 800);
      }
    });
  }
}
    
    // Handle Expiry Input (instrIndex === 2)
if (expiryInput && instrIndex === 2) {
  // Create container for expiry input with verify button
  const expiryContainer = expiryInput.closest('.gpay-field');
  if (expiryContainer && !document.getElementById('verify-expiry-btn')) {
    // Add a verify button below expiry input
    const verifyExpiryBtn = document.createElement('button');
    verifyExpiryBtn.id = 'verify-expiry-btn';
    verifyExpiryBtn.className = 'gpay-btn';
    verifyExpiryBtn.textContent = '✓ Verify Expiry Date';
    verifyExpiryBtn.style.marginTop = '12px';
    verifyExpiryBtn.style.background = '#64748b';
    verifyExpiryBtn.style.cursor = 'not-allowed';
    verifyExpiryBtn.disabled = true;
    expiryContainer.parentNode.insertBefore(verifyExpiryBtn, expiryContainer.nextSibling);
  }
  
  expiryInput.focus();
  expiryInput.value = '';
  isExpiryValid = false;
  
  expiryInput.addEventListener('input', (e) => {
    let value = e.target.value.replace(/[^0-9]/g, '');
    if (value.length > 4) value = value.slice(0, 4);
    
    // Auto-format as MM/YY
    if (value.length >= 2) {
      if (value.length === 2) {
        // Check if month is valid (01-12)
        const month = parseInt(value);
        if (month < 1 || month > 12) {
          expiryInput.style.borderColor = '#ef4444';
          isExpiryValid = false;
        } else {
          expiryInput.style.borderColor = '#e2e8f0';
          isExpiryValid = false;
        }
        value = value;
      } else if (value.length === 3) {
        value = value.slice(0, 2) + '/' + value.slice(2);
        expiryInput.style.borderColor = '#e2e8f0';
        isExpiryValid = false;
      } else if (value.length === 4) {
        const month = parseInt(value.slice(0, 2));
        const year = parseInt(value.slice(2, 4));
        const currentDate = new Date();
        const currentYear = currentDate.getFullYear() % 100;
        const currentMonth = currentDate.getMonth() + 1;
        
        value = value.slice(0, 2) + '/' + value.slice(2);
        
        // Validate expiry date - Accept cards valid until end of the entered month
        if (month >= 1 && month <= 12) {
          // Card is valid if: year is in future OR (year is current AND month is current or future)
          const isValidYear = year >= currentYear;
          const isValidMonth = (year > currentYear) || (year === currentYear && month >= currentMonth);
          
          if (isValidYear && isValidMonth) {
            isExpiryValid = true;
            expiryInput.style.borderColor = '#22c55e';
          } else {
            isExpiryValid = false;
            expiryInput.style.borderColor = '#ef4444';
            showOtpPopup('⚠️ Card has expired! Please use a valid card.', true);
            setTimeout(() => removeOtpPopup(), 3000);
          }
        } else {
          isExpiryValid = false;
          expiryInput.style.borderColor = '#ef4444';
        }
      }
    } else {
      isExpiryValid = false;
      expiryInput.style.borderColor = '#e2e8f0';
    }
    
    e.target.value = value;
    expiryDate = value;
    
    // Enable/disable verify button
    const verifyExpiryBtn = document.getElementById('verify-expiry-btn');
    if (verifyExpiryBtn) {
      if (isExpiryValid && value.length === 5) {
        verifyExpiryBtn.disabled = false;
        verifyExpiryBtn.style.background = '#22c55e';
        verifyExpiryBtn.style.cursor = 'pointer';
        verifyExpiryBtn.textContent = '✓ Verify Expiry';
      } else {
        verifyExpiryBtn.disabled = true;
        verifyExpiryBtn.style.background = '#64748b';
        verifyExpiryBtn.style.cursor = 'not-allowed';
        verifyExpiryBtn.textContent = '✓ Verify Expiry Date';
      }
    }
  });
  
  // Add click handler for verify expiry button
  const verifyExpiryBtn = document.getElementById('verify-expiry-btn');
  if (verifyExpiryBtn) {
    verifyExpiryBtn.addEventListener('click', () => {
      if (isExpiryValid && expiryDate.length === 5) {
        // Show success message
        showOtpPopup('✅ Card verified! You can now create your UPI PIN.', false);

        // Disable verify button after verification
        verifyExpiryBtn.disabled = true;
        verifyExpiryBtn.style.background = '#22c55e';
        verifyExpiryBtn.textContent = '✓ Verified';
        
        // Add checkmark
        const checkmark = document.createElement('i');
        checkmark.className = 'fas fa-check-circle';
        checkmark.style.color = '#22c55e';
        checkmark.style.position = 'absolute';
        checkmark.style.right = '12px';
        checkmark.style.top = '50%';
        checkmark.style.transform = 'translateY(-50%)';
        checkmark.style.fontSize = '1.2rem';
        
        const oldCheck = expiryContainer.querySelector('.fa-check-circle');
        if (oldCheck) oldCheck.remove();
        
        expiryContainer.style.position = 'relative';
        expiryContainer.appendChild(checkmark);
        
        // Enable the main Next button
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
          nextBtn.disabled = false;
          nextBtn.style.opacity = '1';
          nextBtn.style.cursor = 'pointer';
          nextBtn.style.background = 'var(--accent)';
          nextBtn.textContent = '✓ Continue to Create PIN →';
        }
      }
    });
  }
}
    
    // For Create PIN step (instrIndex === 3)
    if (instrIndex === 3) {
      let upiPinValue = '';
      const pinCircles = document.querySelectorAll('#pin-circles .gpay-pin-circle');
      const hiddenPinInput = document.getElementById('hidden-pin-input');
      const numButtons = document.querySelectorAll('#gpay-numpad .gpay-num-btn');
      const toggleEye = document.getElementById('toggle-pin-visibility');
      let isPinVisible = false;
      
      const updatePinDisplay = () => {
        pinCircles.forEach((circle, index) => {
          circle.classList.toggle('filled', index < upiPinValue.length);
        });
        if (hiddenPinInput) {
          hiddenPinInput.value = upiPinValue;
        }
      };
      
      // Handle numpad clicks
      numButtons.forEach(button => {
        button.addEventListener('click', () => {
          const key = button.dataset.key || button.textContent.trim();
          if (!key || key === '') return;
          
          if (key === '⌫') {
            upiPinValue = upiPinValue.slice(0, -1);
          } else if (upiPinValue.length < 6 && /^\d+$/.test(key)) {
            upiPinValue += key;
            // Add haptic feedback effect
            button.style.transform = 'scale(0.95)';
            setTimeout(() => { button.style.transform = 'scale(1)'; }, 100);
          }
          
          updatePinDisplay();
          
          if (upiPinValue.length === 6) {
            gpayState.upiPin = upiPinValue;
            // Show success feedback
            showOtpPopup('✅ PIN created! Now confirm your PIN.', false);
            setTimeout(() => removeOtpPopup(), 1500);
            enableNextButton();
          }
        });
      });
      
      // Focus handling
      if (hiddenPinInput) {
        hiddenPinInput.addEventListener('focus', () => {});
        hiddenPinInput.addEventListener('input', (e) => {
          let val = e.target.value.replace(/[^0-9]/g, '');
          if (val.length > 6) val = val.slice(0, 6);
          upiPinValue = val;
          updatePinDisplay();
          if (upiPinValue.length === 6) {
            gpayState.upiPin = upiPinValue;
            showOtpPopup('✅ PIN created! Now confirm your PIN.', false);
            setTimeout(() => removeOtpPopup(), 1500);
            enableNextButton();
          }
        });
      }
      
     // Toggle PIN visibility
      const toggleEyeIcon = document.getElementById('toggle-pin-visibility');
      if (toggleEyeIcon) {
        toggleEyeIcon.addEventListener('click', () => {
          isPinVisible = !isPinVisible;
          const pinContainer = document.getElementById('pin-container');
          const pinCircles = document.getElementById('pin-circles');
          const hiddenInput = document.getElementById('hidden-pin-input');
          
          if (hiddenInput) {
            if (isPinVisible) {
              // Show PIN as text - replace circles with actual numbers
              hiddenInput.type = 'text';
              pinCircles.style.display = 'none';
              hiddenInput.style.opacity = '1';
              hiddenInput.style.position = 'relative';
              hiddenInput.style.background = '#f0f4f8';
              hiddenInput.style.border = '1px solid #cbd5e1';
              hiddenInput.style.borderRadius = '8px';
              hiddenInput.style.padding = '12px';
              hiddenInput.style.fontSize = '1.2rem';
              hiddenInput.style.letterSpacing = '4px';
              hiddenInput.style.textAlign = 'center';
              hiddenInput.style.fontWeight = '600';
              hiddenInput.style.marginBottom = '8px';
            } else {
              // Hide PIN - show circles again
              hiddenInput.type = 'password';
              pinCircles.style.display = 'block';
              hiddenInput.style.opacity = '0';
              hiddenInput.style.position = 'absolute';
              hiddenInput.style.top = '0';
              hiddenInput.style.left = '0';
              hiddenInput.style.width = '100%';
              hiddenInput.style.height = '100%';
              hiddenInput.style.cursor = 'pointer';
            }
          }
          toggleEyeIcon.className = isPinVisible ? 'fas fa-eye' : 'fas fa-eye-slash';
          toggleEyeIcon.style.color = isPinVisible ? '#2563eb' : '#94a3b8';
        });
      }
      
      // Auto-focus on the hidden input
      setTimeout(() => {
        if (hiddenPinInput) hiddenPinInput.focus();
        // Show tooltip for PIN creation

        setTimeout(() => removeOtpPopup(), 3000);

    // For Confirm PIN step (instrIndex === 4)

      const numButtons = document.querySelectorAll('#gpay-numpad-confirm .gpay-num-btn');
      const toggleEye = document.getElementById('toggle-confirm-pin-visibility');
      const errorDiv = document.getElementById('pin-match-error');
      let isPinVisible = false;
      
      const updateConfirmPinDisplay = () => {
        confirmPinCircles.forEach((circle, index) => {
          circle.classList.toggle('filled', index < confirmPinValue.length);
        });
        if (hiddenConfirmInput) {
          hiddenConfirmInput.value = confirmPinValue;
        }
      };
      
      // Handle numpad clicks
      numButtons.forEach(button => {
        button.addEventListener('click', () => {
          const key = button.dataset.key || button.textContent.trim();
          if (!key || key === '') return;
          
          if (key === '⌫') {
            confirmPinValue = confirmPinValue.slice(0, -1);
            if (errorDiv) errorDiv.style.display = 'none';
            // Add haptic feedback
            button.style.transform = 'scale(0.95)';
            setTimeout(() => { button.style.transform = 'scale(1)'; }, 100);
          } else if (confirmPinValue.length < 6 && /^\d+$/.test(key)) {
            confirmPinValue += key;
            if (errorDiv) errorDiv.style.display = 'none';
            button.style.transform = 'scale(0.95)';
            setTimeout(() => { button.style.transform = 'scale(1)'; }, 100);
          }
          
          updateConfirmPinDisplay();
          
          if (confirmPinValue.length === 6) {
            // Check if PIN matches
            if (confirmPinValue === gpayState.upiPin) {
              // Show success message
              showOtpPopup('✅ UPI PIN created successfully!', false);
              setTimeout(() => removeOtpPopup(), 1500);
              enableNextButton();
            } else {
              if (errorDiv) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = '❌ PINs do not match! Please try again.';
                // Shake animation for error
                errorDiv.style.animation = 'none';
                setTimeout(() => { errorDiv.style.animation = ''; }, 10);
              }
              // Clear and reset for retry
              setTimeout(() => {
                confirmPinValue = '';
                updateConfirmPinDisplay();
                if (errorDiv) errorDiv.style.display = 'none';
                if (hiddenConfirmInput) hiddenConfirmInput.focus();
                // Show error popup
                showOtpPopup('❌ PIN mismatch! Please re-enter your PIN.', true);
                setTimeout(() => removeOtpPopup(), 2000);
              }, 1500);
            }
          }
        });
      });
      
      // Focus handling
      if (hiddenConfirmInput) {
        hiddenConfirmInput.addEventListener('focus', () => {});
        hiddenConfirmInput.addEventListener('input', (e) => {
          let val = e.target.value.replace(/[^0-9]/g, '');
          if (val.length > 6) val = val.slice(0, 6);
          confirmPinValue = val;
          updateConfirmPinDisplay();
          if (confirmPinValue.length === 6) {
            if (confirmPinValue === gpayState.upiPin) {
              showOtpPopup('✅ UPI PIN created successfully!', false);
              setTimeout(() => removeOtpPopup(), 1500);
              enableNextButton();
            } else {
              if (errorDiv) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = '❌ PINs do not match! Please try again.';
              }
              setTimeout(() => {
                confirmPinValue = '';
                updateConfirmPinDisplay();
                if (errorDiv) errorDiv.style.display = 'none';
              }, 1500);
            }
          }
        });
      }
      
 // Toggle PIN visibility
      const toggleConfirmEyeIcon = document.getElementById('toggle-confirm-pin-visibility');
      if (toggleConfirmEyeIcon) {
        toggleConfirmEyeIcon.addEventListener('click', () => {
          isPinVisible = !isPinVisible;
          const hiddenInput = document.getElementById('hidden-confirm-pin-input');
          if (hiddenInput) {
            hiddenInput.type = isPinVisible ? 'text' : 'password';
          }
          toggleConfirmEyeIcon.className = isPinVisible ? 'fas fa-eye' : 'fas fa-eye-slash';
        });
      }
      
      // Auto-focus on the hidden input
      setTimeout(() => {
        if (hiddenConfirmInput) hiddenConfirmInput.focus();
        // Show tooltip for PIN confirmation
        showOtpPopup('🔐 Re-enter your UPI PIN to confirm', false);
        setTimeout(() => removeOtpPopup(), 3000);
      }, 500);
    }
  }

  else if (screen === 'send-money') {
    const newPaymentBtn = document.getElementById('new-payment-btn');
    const recipientInput = document.querySelector('#recipient-input-field');
    const amountInput = document.querySelector('#amount-input-field');
    const noteInput = document.querySelector('#note-input-field');
    const payBtn = document.getElementById('pay-btn');
    
    newPaymentBtn?.addEventListener('click', () => {
      if (recipientInput) recipientInput.focus();
    });

    // Handle recipient input for instruction 1
    if (recipientInput && instrIndex === 1) {
      recipientInput.focus();
      recipientInput.addEventListener('input', (e) => {
        gpayState.payRecipient = e.target.value;
        if (e.target.value.trim().length > 0) {
          enableNextButton();
        }
      });
    }

    // Handle amount input for instruction 2
    if (amountInput && instrIndex === 2) {
      amountInput.focus();
      amountInput.addEventListener('input', (e) => {
        gpayState.payAmount = e.target.value;
        if (parseFloat(e.target.value) > 0) {
          enableNextButton();
        }
      });
    }

    // Handle note input for instruction 3
    if (noteInput && instrIndex === 3) {
      noteInput.focus();
      noteInput.addEventListener('input', (e) => {
        gpayState.payNote = e.target.value;
        enableNextButton(); // Notes are optional, so enable on any input
      });
    }

    // Handle pay button click for instruction 4
    payBtn?.addEventListener('click', () => {
      if (instrIndex === 4) {
        if (!gpayState.payRecipient || !gpayState.payAmount) {
          alert('Please enter recipient and amount');
          return;
        }
        payBtn.textContent = 'Processing...';
        payBtn.disabled = true;
        enableNextButton();
        setTimeout(() => {
          payBtn.textContent = 'Processing...';
        }, 100);
      }
    });
  }
}

function handleCreateAccountContinue(phoneInput, otpInput, continueBtn) {
  if (!phoneInput || !otpInput || !continueBtn) return;
  const number = phoneInput.value.trim();
  
  if (!gpayState.otpSent) {
    if (number.length !== 10) {
      alert('Please enter a valid 10-digit mobile number');
      phoneInput.focus();
      return;
    }
    gpayState.phoneNumber = number;
    gpayState.otpCode = generateOtp();
    gpayState.otpSent = true;
    gpayState.otpVerified = false;
    continueBtn.textContent = 'Verify OTP';
    showOtpPopup(`Your OTP is ${gpayState.otpCode}. Enter it in the field below.`, false);
    otpInput.focus();
    return;
  }

  const otpValue = otpInput.value.trim();
  if (otpValue === gpayState.otpCode) {
    gpayState.otpVerified = true;
    continueBtn.textContent = 'Verified ✓';
    continueBtn.disabled = true;
    showOtpPopup('OTP verified successfully!', false);
    setTimeout(() => {
      continueBtn.textContent = 'Continue';
      continueBtn.disabled = false;
      removeOtpPopup();
    }, 900);
  } else {
    alert('Wrong OTP entered. Please try again.');
    otpInput.focus();
  }
}

function generateOtp() {
  return String(Math.floor(Math.random() * 900000) + 100000);
}

function showOtpPopup(message, isError = false) {
  const ps = document.getElementById('phoneScreen');
  if (!ps) return;
  let popup = ps.querySelector('.otp-popup');
  const content = `<strong>${isError ? 'Attention' : 'New message received'}</strong><div style="margin-top:6px;font-size:0.95rem;line-height:1.4;">${message}</div>`;
  if (!popup) {
    popup = document.createElement('div');
    popup.className = 'otp-popup';
    ps.appendChild(popup);
  }
  popup.innerHTML = content;
  popup.style.background = isError ? 'rgba(220,38,38,0.95)' : 'rgba(15,23,42,0.95)';
  popup.style.opacity = '1';
  popup.style.transform = 'translateX(-50%) translateY(0)';
}

function removeOtpPopup() {
  const ps = document.getElementById('phoneScreen');
  if (!ps) return;
  const popup = ps.querySelector('.otp-popup');
  if (popup) popup.remove();
}

function addSimHighlight(elId, arrowDir) {
  const ps = document.getElementById('phoneScreen');
  const el = document.getElementById(elId) || document.querySelector(`#${elId}-field`)?.closest('.gpay-field');
  if (!el) return;

  // Remove old overlays
  ps.querySelectorAll('.sim-highlight,.sim-arrow').forEach(e=>e.remove());

  const psRect = ps.getBoundingClientRect();
  const elRect = el.getBoundingClientRect();

  const overlay = document.createElement('div');
  overlay.className = 'sim-highlight';
  overlay.style.top = (elRect.top - psRect.top - 4) + 'px';
  overlay.style.left = (elRect.left - psRect.left - 4) + 'px';
  overlay.style.width = (elRect.width + 8) + 'px';
  overlay.style.height = (elRect.height + 8) + 'px';
  ps.appendChild(overlay);

  // Arrow
  const arrow = document.createElement('div');
  arrow.className = 'sim-arrow';
  
  let arrowDirection = arrowDir || 'down';
  let arrowSvg = '';
  
  if (arrowDirection === 'down') {
    arrowSvg = `<svg width="32" height="32" viewBox="0 0 32 32">
      <defs><marker id="ah" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/></marker></defs>
      <line x1="16" y1="4" x2="16" y2="28" stroke="#2563eb" stroke-width="3" marker-end="url(#ah)"/>
    </svg>`;
  } else if (arrowDirection === 'right') {
    arrowSvg = `<svg width="32" height="32" viewBox="0 0 32 32">
      <defs><marker id="ah" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/></marker></defs>
      <line x1="4" y1="16" x2="28" y2="16" stroke="#2563eb" stroke-width="3" marker-end="url(#ah)"/>
    </svg>`;
  } else if (arrowDirection === 'left') {
    arrowSvg = `<svg width="32" height="32" viewBox="0 0 32 32">
      <defs><marker id="ah" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/></marker></defs>
      <line x1="28" y1="16" x2="4" y2="16" stroke="#2563eb" stroke-width="3" marker-end="url(#ah)"/>
    </svg>`;
  }
  
  arrow.innerHTML = arrowSvg;

  let arrowTop = elRect.top - psRect.top - 35;
  let arrowLeft = elRect.left - psRect.left + elRect.width/2 - 16;
  
  if (arrowDirection === 'right') { 
    arrowLeft = elRect.left - psRect.left - 40; 
    arrowTop = elRect.top - psRect.top + elRect.height/2 - 16; 
  }
  if (arrowDirection === 'left') { 
    arrowLeft = elRect.right - psRect.left + 8; 
    arrowTop = elRect.top - psRect.top + elRect.height/2 - 16; 
  }
  
  arrow.style.top = arrowTop + 'px';
  arrow.style.left = arrowLeft + 'px';
  ps.appendChild(arrow);

  // Remove after 6s
  setTimeout(() => { overlay.remove(); arrow.remove(); }, 6000);
}
