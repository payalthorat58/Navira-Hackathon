      <h3 style="color:#ea580c;font-size:1.4rem;">👋 Meet Jiya — Scam Safety Quiz!</h3>
      <p style="color:#1e293b;font-size:1.1rem;line-height:1.6;">You've learned all about Google Pay. Now test your knowledge with <strong>10 real-world scam scenarios</strong>!</p>
      <p style="margin-top:1rem;color:#1e293b;font-size:1.1rem;line-height:1.6;">Jiya's phone is about to ring from an unknown number. What she does next changes the type of questions you'll face!</p>
      <ul style="margin-top:1rem;padding-left:1.2rem;color:#1e293b;font-size:1rem;line-height:2;">
        <li>If she <strong>answers</strong> → 10 call-based scenarios</li>
        <li>If she <strong>declines</strong> → the scammer texts her instead, and you get 1 call + 9 SMS scenarios</li>
      </ul>
    </div>
    <button class="instr-nav-btn" onclick="showJiyaIncomingCall()" style="margin-top:1.5rem;min-height:60px;font-size:1.3rem;">Jiya's Phone is Ringing! →</button>
  `;

  document.getElementById('phoneScreen').innerHTML = `
    <div class="jiya-intro">
      <div class="jiya-avatar">👩</div>
      <div class="jiya-name">Jiya's Safety Quiz</div>
      <div class="jiya-desc">Help her stay safe from scammers!</div>
    </div>
  `;
}

function showJiyaIncomingCall() {
  document.getElementById('dynamicInstruction').innerHTML = `
    <div class="instr-card" style="background:linear-gradient(135deg,#fff1f2,#ffe4e6);border-left-color:#ef4444;">
      <h3 style="color:#dc2626;font-size:1.4rem;">📳 Jiya is receiving a call from an unknown number!</h3>
      <p style="color:#1e293b;font-size:1.1rem;line-height:1.6;">She has no idea who it is. What should she do?</p>
      <p style="margin-top:1rem;color:#64748b;font-size:0.95rem;">Tap an option on Jiya's phone to decide.</p>
    </div>
  `;

  document.getElementById('phoneScreen').innerHTML = `
    <div class="call-screen">
      <div class="call-contact">
        <div style="font-size:0.85rem;color:#94a3b8;margin-bottom:1.5rem;font-weight:600;letter-spacing:0.5px;">INCOMING CALL</div>
        <div class="call-avatar">📵</div>
        <div class="call-label">Unknown number</div>
        <div class="call-name">+91 98XXX XXXXX</div>
        <div style="margin-top:1rem;background:rgba(239,68,68,0.15);border-radius:20px;padding:6px 16px;font-size:0.8rem;color:#fca5a5;">⚠ Not saved in contacts</div>
      </div>
      <div class="call-actions">
        <button class="call-btn pickup" onclick="jiyaAnswersCall()"><i class="fas fa-phone"></i>Answer</button>
        <button class="call-btn decline" onclick="jiyaDeclinesCall()"><i class="fas fa-phone-slash"></i>Decline</button>
      </div>
    </div>
  `;
}

function jiyaAnswersCall() {
  jiyaAnsweredCall = true;
  currentQuizIndex = 0;

  document.getElementById('dynamicInstruction').innerHTML = `
    <div class="instr-card" style="background:linear-gradient(135deg,#fff7ed,#ffedd5);border-left-color:#f97316;">
      <h3 style="color:#ea580c;font-size:1.4rem;">📞 Jiya answered the call!</h3>
      <p style="color:#1e293b;font-size:1.1rem;line-height:1.6;">The caller starts with suspicious questions. Help Jiya respond to all <strong>10 call scenarios</strong>!</p>
    </div>
  `;

  document.getElementById('phoneScreen').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:linear-gradient(180deg,#1e3a5f,#0f172a);color:white;padding:20px;text-align:center;">
      <div style="font-size:3rem;margin-bottom:12px;animation:jiyaPop 0.4s ease;">📞</div>
      <div style="font-size:1rem;font-weight:700;margin-bottom:6px;">Call Connected</div>
      <div style="font-size:0.85rem;color:#94a3b8;">The caller starts speaking...</div>
    </div>
  `;

  setTimeout(() => showQuizQuestion(), 1500);
}

function jiyaDeclinesCall() {
  jiyaAnsweredCall = false;
  currentQuizIndex = 0;

  document.getElementById('dynamicInstruction').innerHTML = `
    <div class="instr-card" style="background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border-left-color:#0284c7;">
      <h3 style="color:#0369a1;font-size:1.4rem;">✋ Jiya declined the call — smart move!</h3>
      <p style="color:#1e293b;font-size:1.1rem;line-height:1.6;">But the scammer didn't give up. They sent her a <strong>text message</strong> instead!</p>
      <p style="margin-top:0.8rem;color:#1e293b;font-size:1rem;line-height:1.6;">First question will be about this text. Then 9 more SMS-based scenarios follow.</p>
    </div>
  `;

  document.getElementById('phoneScreen').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px;background:#f1f5fb;">
      <div style="font-size:2.5rem;margin-bottom:12px;">📱</div>
      <div style="font-size:1rem;font-weight:700;color:#0369a1;margin-bottom:12px;">New SMS Received</div>
      <div style="background:white;border-radius:12px;padding:14px;font-size:0.9rem;color:#1e293b;line-height:1.6;border-left:5px solid #0284c7;width:100%;">
        ${smsScenarios[0].message}
      </div>
      <div style="margin-top:10px;font-size:0.8rem;color:#64748b;">From: +91 98XXX XXXXX (Unknown)</div>
    </div>
  `;

  setTimeout(() => showQuizQuestion(), 2000);
}

function showQuizQuestion() {
  if (currentQuizIndex >= 10) {
    showQuizResults();
    return;
  }

  const isCall = jiyaAnsweredCall;
  const scenario = isCall ? callScenarios[currentQuizIndex] : smsScenarios[currentQuizIndex];
  const label = isCall ? '📞 Caller says:' : '📱 Text message received:';
  const icon = isCall ? '📞' : '📱';

  document.getElementById('dynamicInstruction').innerHTML = `
    <div class="instr-card" style="background:linear-gradient(135deg,#fff7ed,#ffedd5);border-left-color:#f97316;">
      <h3 style="color:#ea580c;font-size:1.3rem;">${icon} Question ${currentQuizIndex + 1}/10: ${scenario.scenario}</h3>
      <div style="background:white;padding:1rem;border-radius:10px;border-left:5px solid #f97316;margin:1rem 0;">
        <div style="font-size:0.9rem;color:#64748b;font-weight:700;margin-bottom:6px;">${label}</div>
        <div style="color:#1e293b;font-size:1rem;line-height:1.6;">${scenario.message}</div>
      </div>
      <p style="color:#1e293b;font-weight:700;font-size:1rem;margin-top:0.5rem;">What should Jiya do?</p>
      <p style="font-size:0.9rem;color:#64748b;">Score: ${quizScore}/${currentQuizIndex}</p>
    </div>
  `;

  document.getElementById('phoneScreen').innerHTML = `
    <div class="${isCall ? 'active-call' : ''}" style="display:flex;flex-direction:column;padding:16px;height:100%;background:${isCall ? 'linear-gradient(180deg,#f8fafc,#f1f5fb)' : '#f1f5fb'};gap:10px;overflow-y:auto;">
      <div style="background:white;border-radius:12px;padding:12px;border-left:5px solid ${isCall ? '#f97316' : '#0284c7'};margin-bottom:4px;font-size:0.9rem;color:#1e293b;line-height:1.5;">
        ${isCall ? '<div style="font-size:0.75rem;font-weight:700;color:#64748b;margin-bottom:6px;">CALLER SAYS:</div>' : '<div style="font-size:0.75rem;font-weight:700;color:#64748b;margin-bottom:6px;">SMS RECEIVED:</div>'}
        ${scenario.message}
      </div>
      <div style="font-size:0.85rem;font-weight:700;color:#1e293b;padding:0 2px;">What should Jiya do?</div>
      ${scenario.options.map((opt, idx) => `
        <button onclick="handleAnswer(${idx})" style="background:white;border:2px solid #e2e8f0;border-radius:12px;padding:12px;font-size:0.9rem;font-weight:600;color:#1e293b;text-align:left;cursor:pointer;transition:all 0.2s;min-height:52px;line-height:1.4;">
          ${opt.text}
        </button>
      `).join('')}
    </div>
  `;
}

function handleAnswer(optIdx) {
  const isCall = jiyaAnsweredCall;
  const scenario = isCall ? callScenarios[currentQuizIndex] : smsScenarios[currentQuizIndex];
  const selected = scenario.options[optIdx];
  const correct = selected.safe;

  if (correct) quizScore++;

  const icon = correct ? '✅' : '❌';
  const color = correct ? '#16a34a' : '#dc2626';
  const bg = correct ? 'linear-gradient(135deg,#f0fdf4,#dcfce7)' : 'linear-gradient(135deg,#fef2f2,#fee2e2)';
  const border = correct ? '#22c55e' : '#ef4444';

  document.getElementById('dynamicInstruction').innerHTML = `
    <div class="instr-card" style="background:${bg};border-left-color:${border};">
      <h3 style="color:${color};font-size:1.3rem;">${icon} ${correct ? 'Correct!' : 'Incorrect!'}</h3>
      <p style="color:#1e293b;font-size:1rem;margin-top:0.8rem;"><strong>You chose:</strong> "${selected.text}"</p>
      <div style="background:white;border-radius:10px;padding:12px;margin-top:1rem;border-left:4px solid ${border};">
        <p style="color:#1e293b;font-size:1rem;line-height:1.6;">${selected.feedback}</p>
      </div>
      <p style="margin-top:1rem;font-size:0.9rem;color:#64748b;">Score so far: ${quizScore}/${currentQuizIndex + 1}</p>
    </div>
    <button class="instr-nav-btn" onclick="nextQuestion()" style="margin-top:1.5rem;min-height:60px;font-size:1.3rem;">
      ${currentQuizIndex + 1 < 10 ? 'Next Question →' : 'See Results →'}
    </button>
  `;

  document.getElementById('phoneScreen').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px;text-align:center;">
      <div style="font-size:4rem;margin-bottom:12px;animation:jiyaPop 0.5s cubic-bezier(0.2,1.4,0.4,1);">${icon}</div>
      <div style="font-size:1.3rem;font-weight:800;color:${color};">${correct ? 'Good call!' : 'Watch out!'}</div>
      <div style="font-size:0.95rem;color:#475569;margin-top:10px;line-height:1.5;background:white;border-radius:12px;padding:12px;border:2px solid ${border};">
        ${selected.feedback}
      </div>
    </div>
  `;
}

function nextQuestion() {
  currentQuizIndex++;
  if (currentQuizIndex >= 10) {
    showQuizResults();
  } else {
    showQuizQuestion();
  }
}

function showQuizResults() {
  const percentage = Math.round((quizScore / 10) * 100);
  const passed = percentage >= 70;

  spawnConfetti(passed);

  document.getElementById('dynamicInstruction').innerHTML = `
    <div class="instr-card" style="background:linear-gradient(135deg,${passed ? '#f0fdf4,#dcfce7' : '#fef2f2,#fee2e2'});border-left-color:${passed ? '#22c55e' : '#ef4444'};">
      <h3 style="color:${passed ? '#16a34a' : '#dc2626'};font-size:1.5rem;">${passed ? '🎉 Well done!' : '📚 Keep practising!'}</h3>
      <p style="color:#1e293b;font-weight:700;font-size:1.3rem;margin:1rem 0;"><strong>Score: ${quizScore}/10 (${percentage}%)</strong></p>
      <p style="color:#1e293b;font-size:1rem;line-height:1.8;">${passed ? 'You have strong scam awareness! You correctly handled most situations Jiya faced.' : 'You got some questions wrong. Review the key rule: never share PIN, OTP, passwords, or card details with anyone who contacts you first.'}</p>
      <div style="background:white;border-radius:10px;padding:12px;margin-top:1rem;border-left:4px solid #f59e0b;">
        <p style="color:#92400e;font-size:0.95rem;font-weight:700;">Golden Rule: If someone contacts YOU asking for sensitive information — hang up or delete the message. Real banks never ask for PIN, OTP, or passwords this way.</p>
      </div>
    </div>
    <button class="instr-nav-btn" onclick="completeGpayModule(${passed})" style="margin-top:1.5rem;min-height:60px;font-size:1.3rem;background:${passed ? '#22c55e' : '#f97316'};">${passed ? 'Claim Your Points 🏆' : 'Complete Module →'}</button>
  `;

  document.getElementById('phoneScreen').innerHTML = `
    <div class="result-screen ${passed ? 'success' : 'warning'}">
      <div class="result-icon">${passed ? '🏆' : '📖'}</div>
      <div class="result-title">${percentage}%</div>
      <div class="result-desc">${quizScore} out of 10 correct</div>
      <button class="result-continue-btn" onclick="completeGpayModule(${passed})">${passed ? 'Complete!' : 'Finish'}</button>
    </div>
  `;
}

function completeGpayModule(passed) {
  const mod = modules[0];
  if (!mod.completed) {
    mod.completed = true;
    totalPoints += passed ? mod.points : Math.floor(mod.points * 0.5);
    updateGlobalUI();
    renderModules();
  }

  document.getElementById('dynamicInstruction').innerHTML = `
    <div class="instr-card" style="background:var(--accent-soft);">
      <h3>✅ Google Pay Module Complete!</h3>
      <p>You've finished the Google Pay learning module. You earned <strong>${passed ? modules[0].points : Math.floor(modules[0].points * 0.5)} points</strong>!</p>
      <p style="margin-top:0.5rem;">Explore other modules in the left panel to earn all 100 points and reach Gold status!</p>
    </div>
  `;
  document.getElementById('phoneScreen').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px;text-align:center;">
      <div style="font-size:4rem;margin-bottom:12px;">🏆</div>
      <div style="font-size:1.3rem;font-weight:800;color:var(--accent);">Module Complete!</div>
      <div style="font-size:0.9rem;color:var(--text-muted);margin-top:8px;">Google Pay — ${passed ? modules[0].points : Math.floor(modules[0].points * 0.5)} pts earned</div>
    </div>
  `;
}

function spawnConfetti(success) {
  const ps = document.getElementById('phoneScreen');
  const colors = success
    ? ['#22c55e','#4ade80','#86efac','#facc15','#fbbf24']
    : ['#ef4444','#f97316','#fca5a5','#fed7aa'];
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-particle';
    p.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*30}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.5}s;transform:rotate(${Math.random()*360}deg);`;
    ps.appendChild(p);
    setTimeout(() => p.remove(), 2000);
  }
}

// ===================== TOUR =====================
let tour = null;
function startTour() {
  if (tour) tour.cancel();
  document.getElementById('welcomeBox').style.display = 'none';
  const di = document.getElementById('dynamicInstruction');
  di.style.display = 'block';
  di.innerHTML = `<div class="welcome-box" style="background:var(--accent-soft);"><i class="fas fa-compass" style="font-size:2rem;color:var(--accent);"></i><h2>Tour Active</h2><p>Follow the highlighted steps to learn the app!</p></div>`;

  tour = new Shepherd.Tour({
    useModalOverlay:true,
    defaultStepOptions:{
      classes:'shepherd-theme-arrows',
      scrollTo:{behavior:'smooth',block:'center'},
      cancelIcon:{enabled:true}
    }
  });

  tour.addStep({
    id:'profile-step',
    title:'👤 Your Profile',
    text:'Here you can see your name and the medal you earn as you complete modules.',
    attachTo:{element:'#userProfile',on:'bottom'},
    buttons:[{text:'Next →',action:()=>tour.next()}]
  });
  tour.addStep({
    id:'progress-step',
    title:'📊 Your Progress',
    text:'This shows your total points out of 100. Complete all modules to earn a Gold medal! 🥇',
    attachTo:{element:'#progressSection',on:'bottom'},
    buttons:[{text:'← Back',action:()=>tour.back()},{text:'Next →',action:()=>tour.next()}]
  });
  tour.addStep({
    id:'modules-step',
    title:'📚 Training Modules',
    text:'All your lessons are here. Click any card to start learning step by step!',
    attachTo:{element:'#modulesPanel',on:'right'},
    buttons:[{text:'← Back',action:()=>tour.back()},{text:'Next →',action:()=>tour.next()}]
  });
  tour.addStep({
    id:'mobile-step',
    title:'📱 Mobile Simulator',
    text:'This phone shows you exactly how the apps look and work. You\'ll practise right here!',
    attachTo:{element:'#mobilePanel',on:'left'},
    buttons:[{text:'← Back',action:()=>tour.back()},{text:'Next →',action:()=>tour.next()}]
  });
  tour.addStep({
    id:'start-step',
    title:'🚀 Let\'s Get Started!',
    text:'You\'re all set! Let\'s start with <strong>Google Pay</strong> — click on the Google Pay card to begin your first lesson.',
    attachTo:{element:'.module-card',on:'right'},
    buttons:[{text:'← Back',action:()=>tour.back()},{text:'Let\'s Start!',action:()=>{
      tour.complete();
      document.getElementById('welcomeBox').style.display = 'none';
      const d = document.getElementById('dynamicInstruction');
      d.style.display = 'block';
      d.innerHTML = `
        <div class="instr-card" style="background:linear-gradient(135deg,#eff6ff,#dbeafe);border-left-color:#2563eb;">
          <h3>👆 Let's Start with Google Pay!</h3>
          <p>Click on the <strong>Learn Google Pay</strong> card on the left to begin your first step-by-step lesson. You'll learn everything from downloading the app to sending money safely!</p>
        </div>`;
    }}]
  });

  tour.on('cancel', () => {
    document.getElementById('welcomeBox').style.display = 'none';
    const d = document.getElementById('dynamicInstruction');
    d.style.display = 'block';
    d.innerHTML = `
      <div class="instr-card" style="background:linear-gradient(135deg,#eff6ff,#dbeafe);border-left-color:#2563eb;">
        <h3>👆 Let's Start with Google Pay!</h3>
        <p>Click on the <strong>Learn Google Pay</strong> card on the left to begin your first step-by-step lesson. You'll learn everything from downloading the app to sending money safely!</p>
      </div>`;
  });

  tour.start();
}

// ===================== THEME =====================
let isDark = false;
document.getElementById('themeToggle').addEventListener('click',()=>{
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('themeToggle').innerHTML = isDark
    ? '<i class="fas fa-sun"></i> Light Mode'
    : '<i class="fas fa-moon"></i> Dark Mode';
});

// ===================== INIT =====================
renderModules();
updateGlobalUI();

document.getElementById('startTourBtn').addEventListener('click', startTour);

setTimeout(()=>{
  if (!localStorage.getItem('tourCompleted2')) {
    startTour();
    localStorage.setItem('tourCompleted2','true');
  }
}, 800);

const s = document.createElement('style');
s.textContent = `.module-card:hover{transform:translateX(4px);}`;
document.head.appendChild(s);
</script>
</body>
</html>
