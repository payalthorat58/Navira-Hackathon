<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DigiQuiz – Help Jiya Stay Safe</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg1: #020b18;
  --bg2: #051630;
  --bg3: #0a2444;
  --blue1: #1a5fb4;
  --blue2: #2e86de;
  --blue3: #4fa3e8;
  --ice: #7ec8e3;
  --glass: rgba(10,37,69,0.55);
  --glass2: rgba(4,18,40,0.75);
  --border: rgba(78,163,232,0.22);
  --border2: rgba(78,163,232,0.5);
  --text: #f0f6ff;
  --muted: rgba(240,246,255,0.6);
  --faint: rgba(240,246,255,0.35);
  --green: #22d37a;
  --red: #ff5c6a;
  --gold: #ffd166;
  --r: 20px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100%;overflow-x:hidden}
body{
  font-family:'Sora',sans-serif;
  background:var(--bg1);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

/* ── BACKGROUND ── */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-canvas::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 20%, rgba(46,134,222,0.12) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(13,59,122,0.16) 0%,transparent 55%),
    linear-gradient(160deg,#020b18 0%,#051630 45%,#0a2444 80%,#020b18 100%);
}
.bg-orb{
  position:absolute;border-radius:50%;filter:blur(80px);
  animation:orbFloat 8s ease-in-out infinite;
  pointer-events:none;
}
.bg-orb.o1{width:500px;height:500px;top:-150px;left:-100px;background:rgba(30,100,200,0.08);animation-delay:0s}
.bg-orb.o2{width:400px;height:400px;bottom:-100px;right:-80px;background:rgba(78,163,232,0.07);animation-delay:3s}
.bg-orb.o3{width:300px;height:300px;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(46,134,222,0.05);animation-delay:1.5s}

@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.05)}}

/* ── MAIN WRAPPER ── */
#app{
  position:relative;z-index:10;
  width:100%;max-width:680px;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.5rem;
}

/* ── SCREEN BASE ── */
.screen{
  width:100%;
  display:none;
  opacity:0;
  transform:translateY(24px);
  transition:opacity 0.5s cubic-bezier(0.22,1,0.36,1),transform 0.5s cubic-bezier(0.22,1,0.36,1);
}
.screen.active{display:flex;flex-direction:column;align-items:center}
.screen.visible{opacity:1;transform:translateY(0)}

/* ══════════════════════════════════════════
   INTRO SCREEN
══════════════════════════════════════════ */
#screen-intro{gap:2rem;text-align:center}

.intro-badge{
  font-family:'Space Mono',monospace;
  font-size:0.65rem;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--ice);
  background:rgba(78,163,232,0.1);
  border:1px solid rgba(78,163,232,0.3);
  padding:0.4rem 1.2rem;border-radius:40px;
  animation:badgePulse 2.5s ease-in-out infinite;
}
@keyframes badgePulse{0%,100%{box-shadow:0 0 0 0 rgba(78,163,232,0)}50%{box-shadow:0 0 20px rgba(78,163,232,0.35)}}

/* Jiya Avatar */
.avatar-wrap{position:relative;width:140px;height:140px;margin:0 auto}
.avatar-ring{
  position:absolute;inset:-10px;border-radius:50%;
  border:2px solid transparent;
  background:linear-gradient(135deg,#2e86de,#7ec8e3,#1a5fb4) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;
  mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  mask-composite:exclude;
  animation:ringRotate 4s linear infinite;
}
@keyframes ringRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.avatar-glow{
  position:absolute;inset:-20px;border-radius:50%;
  background:radial-gradient(circle,rgba(46,134,222,0.25) 0%,transparent 70%);
  animation:avatarGlow 2s ease-in-out infinite alternate;
}
@keyframes avatarGlow{from{transform:scale(0.9);opacity:0.6}to{transform:scale(1.1);opacity:1}}
.avatar-face{
  width:140px;height:140px;border-radius:50%;
  background:linear-gradient(145deg,#0d3b7a,#1a5fb4,#2e86de);
  display:flex;align-items:center;justify-content:center;
  font-size:4rem;
  box-shadow:0 0 40px rgba(46,134,222,0.4),0 8px 32px rgba(0,0,0,0.3);
  position:relative;z-index:1;
  overflow:hidden;
}
.avatar-face::after{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:linear-gradient(135deg,transparent 40%,rgba(126,200,227,0.15) 50%,transparent 60%);
  animation:avatarShimmer 3s ease-in-out infinite;
}
@keyframes avatarShimmer{0%{transform:translateX(-100%) rotate(0deg)}100%{transform:translateX(100%) rotate(0deg)}}

.intro-title{
  font-size:clamp(1.8rem,5vw,2.8rem);font-weight:800;letter-spacing:-0.02em;line-height:1.1;
  background:linear-gradient(135deg,#f0f6ff 0%,#7ec8e3 50%,#4fa3e8 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.intro-subtitle{
  font-size:clamp(0.9rem,2.5vw,1.05rem);font-weight:300;
  color:var(--muted);line-height:1.7;max-width:420px;
}
.intro-subtitle em{color:var(--ice);font-style:normal;font-weight:500}

.intro-stats{
  display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;
}
.stat-chip{
  background:var(--glass);border:1px solid var(--border);
  border-radius:12px;padding:0.8rem 1.4rem;
  display:flex;flex-direction:column;align-items:center;gap:0.2rem;
  backdrop-filter:blur(16px);
}
.stat-chip .num{font-size:1.5rem;font-weight:700;color:var(--blue3)}
.stat-chip .lbl{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--faint)}

/* ── BUTTONS ── */
.btn-primary{
  display:inline-flex;align-items:center;justify-content:center;gap:0.6rem;
  padding:1rem 2.8rem;border-radius:50px;
  background:linear-gradient(135deg,#1a5fb4,#2e86de,#4fa3e8);
  color:#fff;font-family:'Sora',sans-serif;font-size:1rem;font-weight:600;
  border:none;cursor:pointer;
  box-shadow:0 4px 30px rgba(46,134,222,0.45),0 1px 0 rgba(255,255,255,0.1) inset;
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.25s ease;
  position:relative;overflow:hidden;
  letter-spacing:0.03em;
}
.btn-primary::before{
  content:'';position:absolute;top:-50%;left:-60%;
  width:200%;height:200%;
  background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.15) 50%,transparent 60%);
  transform:translateX(-100%);transition:transform 0.5s ease;
}
.btn-primary:hover::before{transform:translateX(100%)}
.btn-primary:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 8px 40px rgba(46,134,222,0.6)}
.btn-primary:active{transform:scale(0.97)}

/* ══════════════════════════════════════════
   QUIZ SCREEN
══════════════════════════════════════════ */
#screen-quiz{gap:1.4rem;width:100%}

/* Progress */
.progress-head{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  font-size:0.78rem;letter-spacing:0.08em;font-weight:500;color:var(--muted);
}
.progress-head .q-label{font-family:'Space Mono',monospace;color:var(--ice)}
.score-badge{
  background:rgba(34,211,122,0.12);border:1px solid rgba(34,211,122,0.3);
  border-radius:20px;padding:0.25rem 0.8rem;
  font-size:0.72rem;font-weight:600;color:var(--green);
  font-family:'Space Mono',monospace;
}
.progress-bar-track{
  width:100%;height:5px;border-radius:10px;
  background:rgba(78,163,232,0.12);border:1px solid rgba(78,163,232,0.15);overflow:hidden;
}
.progress-bar-fill{
  height:100%;border-radius:10px;
  background:linear-gradient(90deg,#1a5fb4,#4fa3e8);
  transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 0 10px rgba(79,163,232,0.6);
}

/* Scenario Card */
.scenario-card{
  width:100%;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:var(--r);
  backdrop-filter:blur(24px);
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,0.3),0 0 0 1px rgba(78,163,232,0.05);
  min-height:200px;
  display:flex;flex-direction:column;
  position:relative;
}
.scenario-header{
  padding:0.9rem 1.4rem;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0.7rem;
  font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;
  color:var(--muted);background:rgba(4,18,40,0.4);
}
.scenario-type-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:var(--blue3);
  box-shadow:0 0 8px var(--blue3);
  animation:dotBlink 1.5s ease-in-out infinite;
}
@keyframes dotBlink{0%,100%{opacity:1}50%{opacity:0.3}}
.scenario-body{padding:1.5rem;flex:1;display:flex;flex-direction:column;justify-content:center}

/* SMS Bubble */
.sms-bubble-wrap{display:flex;flex-direction:column;gap:0.6rem}
.sms-sender{font-size:0.72rem;color:var(--faint);margin-bottom:0.2rem;font-family:'Space Mono',monospace}
.sms-bubble{
  align-self:flex-start;max-width:90%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:4px 18px 18px 18px;
  padding:0.9rem 1.1rem;
  font-size:0.92rem;line-height:1.6;
  position:relative;
}
.sms-bubble.typing::after{
  content:'';display:inline-block;width:6px;height:6px;
  border-radius:50%;background:var(--blue3);margin-left:6px;
  animation:typingDot 0.8s ease-in-out infinite;vertical-align:middle;
}
@keyframes typingDot{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)}}
.sms-link{color:#ff6b6b;text-decoration:underline;font-family:'Space Mono',monospace;font-size:0.82rem}
.sms-time{font-size:0.65rem;color:var(--faint);text-align:right;margin-top:0.5rem}

/* Call Screen */
.call-screen{
  display:flex;flex-direction:column;align-items:center;gap:1rem;padding:1rem 0;
}
.call-avatar{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,#1a3a6b,#2e6cb5);
  display:flex;align-items:center;justify-content:center;font-size:1.8rem;
  position:relative;
}
.call-ring{
  position:absolute;inset:-8px;border-radius:50%;
  border:2px solid rgba(78,163,232,0.4);
  animation:callRing 1.2s ease-out infinite;
}
.call-ring2{
  position:absolute;inset:-18px;border-radius:50%;
  border:2px solid rgba(78,163,232,0.2);
  animation:callRing 1.2s ease-out infinite 0.4s;
}
.call-ring3{
  position:absolute;inset:-28px;border-radius:50%;
  border:2px solid rgba(78,163,232,0.1);
  animation:callRing 1.2s ease-out infinite 0.8s;
}
@keyframes callRing{0%{transform:scale(0.9);opacity:1}100%{transform:scale(1.5);opacity:0}}
.call-name{font-size:1.1rem;font-weight:600}
.call-sub{font-size:0.78rem;color:var(--muted)}
.call-status{
  font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--green);
  animation:statusPulse 1s ease-in-out infinite;
}
@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:0.4}}
.call-msg{
  background:rgba(255,80,90,0.08);border:1px solid rgba(255,80,90,0.2);
  border-radius:12px;padding:0.8rem 1.1rem;
  font-size:0.9rem;line-height:1.5;text-align:center;font-weight:500;color:#ffb3b8;
  max-width:340px;
}
.call-actions{display:flex;gap:1.5rem;margin-top:0.3rem}
.call-btn{
  width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
  transition:transform 0.2s ease;
}
.call-btn.accept{background:#22d37a;box-shadow:0 4px 20px rgba(34,211,122,0.4)}
.call-btn.decline{background:#ff5c6a;box-shadow:0 4px 20px rgba(255,92,106,0.4)}
.call-btn:hover{transform:scale(1.1)}

/* Email Card */
.email-card{
  background:rgba(4,18,40,0.6);border:1px solid var(--border);
  border-radius:12px;padding:1rem 1.2rem;
  animation:emailSlide 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes emailSlide{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
.email-from{display:flex;align-items:flex-start;gap:0.7rem;margin-bottom:0.8rem}
.email-ico{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#2e86de,#4fa3e8);
  display:flex;align-items:center;justify-content:center;font-size:0.9rem;
}
.email-from-meta{}
.email-sender-name{font-size:0.85rem;font-weight:600}
.email-sender-addr{font-size:0.72rem;color:#ff8c8c;font-family:'Space Mono',monospace}
.email-subject{font-size:0.95rem;font-weight:600;margin-bottom:0.5rem}
.email-body{font-size:0.85rem;color:var(--muted);line-height:1.6}
.email-highlight{color:var(--gold);font-weight:600}

/* WhatsApp */
.wa-wrap{display:flex;flex-direction:column;gap:0.5rem}
.wa-header{display:flex;align-items:center;gap:0.6rem;margin-bottom:0.5rem}
.wa-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#075e54,#128c7e);display:flex;align-items:center;justify-content:center;font-size:0.9rem}
.wa-name{font-size:0.82rem;font-weight:600;color:#25d366}
.wa-online{font-size:0.65rem;color:var(--faint)}
.wa-bubble{
  background:rgba(37,211,102,0.08);border:1px solid rgba(37,211,102,0.15);
  border-radius:4px 18px 18px 18px;
  padding:0.9rem 1.1rem;max-width:88%;
  font-size:0.9rem;line-height:1.6;
}
.wa-amount{color:#ffd166;font-size:1.1rem;font-weight:700}
.wa-btn-msg{
  display:inline-flex;align-items:center;gap:0.4rem;
  background:rgba(37,211,102,0.15);border:1px solid rgba(37,211,102,0.3);
  border-radius:20px;padding:0.35rem 0.9rem;margin-top:0.6rem;
  font-size:0.75rem;color:#25d366;cursor:pointer;width:fit-content;
}

/* OTP */
.otp-wrap{display:flex;flex-direction:column;gap:0.9rem}
.otp-header{
  display:flex;align-items:center;gap:0.8rem;
  background:rgba(255,93,106,0.06);border:1px solid rgba(255,93,106,0.15);
  border-radius:12px;padding:0.8rem 1rem;
}
.otp-icon{font-size:1.5rem}
.otp-title{font-size:0.85rem;font-weight:600}
.otp-from{font-size:0.7rem;color:var(--faint)}
.otp-code-wrap{
  background:rgba(4,18,40,0.7);border:1px solid var(--border);
  border-radius:12px;padding:1rem 1.2rem;
  display:flex;flex-direction:column;align-items:center;gap:0.5rem;
}
.otp-label{font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--faint)}
.otp-code{
  font-family:'Space Mono',monospace;font-size:2rem;font-weight:700;
  letter-spacing:0.3em;color:var(--gold);
  text-shadow:0 0 20px rgba(255,209,102,0.5);
}
.otp-msg{font-size:0.82rem;color:var(--muted);text-align:center;line-height:1.6}
.otp-alert{
  background:rgba(255,92,106,0.1);border:1px solid rgba(255,92,106,0.25);
  border-radius:10px;padding:0.7rem 1rem;font-size:0.82rem;color:#ffb3b8;
  display:flex;align-items:center;gap:0.5rem;
}

/* Question Text */
.q-text{
  width:100%;font-size:clamp(0.95rem,2.5vw,1.08rem);font-weight:500;
  line-height:1.65;color:var(--text);
}
.q-text span{color:var(--ice)}

/* Options */
.options-grid{width:100%;display:flex;flex-direction:column;gap:0.75rem}
.option-btn{
  width:100%;padding:1rem 1.3rem;
  background:var(--glass);border:1px solid var(--border);
  border-radius:14px;backdrop-filter:blur(16px);
  color:var(--text);font-family:'Sora',sans-serif;font-size:0.9rem;font-weight:400;
  text-align:left;cursor:pointer;
  display:flex;align-items:flex-start;gap:0.9rem;
  transition:all 0.25s cubic-bezier(0.22,1,0.36,1);
  position:relative;overflow:hidden;line-height:1.5;
}
.option-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(78,163,232,0) 0%,rgba(78,163,232,0.06) 100%);
  opacity:0;transition:opacity 0.25s ease;
}
.option-btn:hover::before{opacity:1}
.option-btn:hover{border-color:var(--border2);transform:translateX(4px);box-shadow:0 4px 20px rgba(46,134,222,0.15)}
.option-btn:active{transform:scale(0.98)}
.opt-letter{
  width:26px;height:26px;border-radius:8px;flex-shrink:0;
  background:rgba(78,163,232,0.12);border:1px solid rgba(78,163,232,0.25);
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:0.7rem;font-weight:700;color:var(--blue3);
  margin-top:1px;
}
.option-btn.correct{
  border-color:rgba(34,211,122,0.7) !important;
  background:rgba(34,211,122,0.1) !important;
  box-shadow:0 0 24px rgba(34,211,122,0.2) !important;
}
.option-btn.correct .opt-letter{background:rgba(34,211,122,0.2);border-color:rgba(34,211,122,0.5);color:var(--green)}
.option-btn.wrong{
  border-color:rgba(255,92,106,0.6) !important;
  background:rgba(255,92,106,0.08) !important;
}
.option-btn.wrong .opt-letter{background:rgba(255,92,106,0.15);border-color:rgba(255,92,106,0.4);color:var(--red)}
.option-btn:disabled{cursor:not-allowed}

/* Feedback Popup */
.feedback-popup{
  position:fixed;top:0;left:0;right:0;
  z-index:999;
  display:flex;flex-direction:column;align-items:center;
  padding-top:2rem;
  pointer-events:none;
}
.feedback-pill{
  display:flex;flex-direction:column;align-items:center;gap:0.4rem;
  padding:1rem 2rem;border-radius:20px;
  backdrop-filter:blur(24px);
  border:1px solid;
  box-shadow:0 16px 48px rgba(0,0,0,0.4);
  transform:translateY(-100px);
  transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1),opacity 0.45s ease;
  opacity:0;text-align:center;
  max-width:340px;
  pointer-events:all;
}
.feedback-pill.show{transform:translateY(0);opacity:1}
.feedback-pill.correct{
  background:rgba(22,40,30,0.9);border-color:rgba(34,211,122,0.5);
}
.feedback-pill.wrong{
  background:rgba(40,16,20,0.9);border-color:rgba(255,92,106,0.5);
}
.fp-emoji{font-size:1.8rem}
.fp-title{font-size:1rem;font-weight:700}
.feedback-pill.correct .fp-title{color:var(--green)}
.feedback-pill.wrong .fp-title{color:var(--red)}
.fp-sub{font-size:0.8rem;color:var(--muted)}

/* Explanation */
.explanation-box{
  width:100%;
  background:rgba(46,134,222,0.07);border:1px solid rgba(46,134,222,0.2);
  border-radius:14px;padding:1rem 1.2rem;
  font-size:0.85rem;line-height:1.65;color:var(--muted);
  display:none;animation:explainIn 0.4s ease forwards;
}
@keyframes explainIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.explanation-box strong{color:var(--ice);font-weight:600}
.explanation-box .explain-head{
  display:flex;align-items:center;gap:0.5rem;font-weight:600;font-size:0.88rem;
  color:var(--text);margin-bottom:0.5rem;
}

.btn-next{
  display:none;align-items:center;justify-content:center;gap:0.5rem;
  padding:0.9rem 2.2rem;border-radius:50px;
  background:linear-gradient(135deg,#1a5fb4,#2e86de);
  color:#fff;font-family:'Sora',sans-serif;font-size:0.9rem;font-weight:600;
  border:none;cursor:pointer;
  box-shadow:0 4px 24px rgba(46,134,222,0.35);

.btn-replay{
  display:inline-flex;align-items:center;gap:0.6rem;

}
.btn-replay:hover{background:rgba(78,163,232,0.1);border-color:rgba(78,163,232,0.6);transform:translateY(-2px)}

/* Confetti */
.confetti-piece{
  position:fixed;pointer-events:none;z-index:9999;
  width:8px;height:8px;border-radius:2px;
  animation:confettiFall linear forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* Transition overlay */
#transition-overlay{
  position:fixed;inset:0;z-index:5000;
  background:var(--bg2);
  opacity:0;pointer-events:none;
  transition:opacity 0.35s ease;
}
#transition-overlay.show{opacity:1;pointer-events:all}

<script>
/* ══════════════════════════════════════════════

const questions = [

    options:[
      'The cashback amount of ₹5,000',

    id:4,

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let currentQ = 0;
let score = 0;
let answered = false;

/* ══════════════════════════════════════════════
   SCREEN MANAGEMENT
══════════════════════════════════════════════ */
function showScreen(id) {
  const overlay = document.getElementById('transition-overlay');
  overlay.classList.add('show');
  setTimeout(()=>{
    document.querySelectorAll('.screen').forEach(s=>{
      s.classList.remove('active','visible');
    });
    const screen = document.getElementById(id);
    screen.classList.add('active');
    overlay.classList.remove('show');
    setTimeout(()=> screen.classList.add('visible'), 30);
  }, 350);
}

/* ══════════════════════════════════════════════
   START
══════════════════════════════════════════════ */
function startQuiz() {
  currentQ = 0;
  score = 0;
  answered = false;
  showScreen('screen-quiz');
  setTimeout(()=> loadQuestion(0), 400);
}

/* ══════════════════════════════════════════════
   LOAD QUESTION
══════════════════════════════════════════════ */
function loadQuestion(idx) {
  const q = questions[idx];
  answered = false;

  // Progress
  document.getElementById('qLabel').textContent = `Question ${idx+1} of ${questions.length}`;
  document.getElementById('scoreBadge').textContent = `Score: ${score}`;
  document.getElementById('progressFill').style.width = `${((idx+1)/questions.length)*100}%`;

  // Scenario header
  document.getElementById('scenarioTypeLabel').textContent = q.type;
  const dot = document.querySelector('.scenario-type-dot');
  dot.style.background = q.typeColor;
  dot.style.boxShadow = `0 0 8px ${q.typeColor}`;

  // Scenario body
  document.getElementById('scenarioBody').innerHTML = q.scenarioHTML;

  // SMS typing effect
  if (q.type === 'SMS') {
    const bubble = document.getElementById('smsBubble');
    bubble.classList.add('typing');
    const textEl = document.getElementById('smsText');
    textEl.innerHTML = '';
    setTimeout(()=>{
      bubble.classList.remove('typing');
      textEl.innerHTML = q.smsContent;
    }, 1400);
  }

  // Question
  document.getElementById('questionText').innerHTML = q.question;

  // Options
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.options.forEach((opt, i)=>{
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = ()=> selectAnswer(i, btn);
    grid.appendChild(btn);
  });

  // Hide explanation and next
  const expBox = document.getElementById('explanationBox');
  expBox.style.display = 'none';
  expBox.innerHTML = '';
  const btnNext = document.getElementById('btnNext');
  btnNext.classList.remove('show');
  btnNext.style.display = 'none';

  // Next button label
  document.getElementById('btnNextLabel').textContent =
    idx < questions.length - 1 ? 'Next Question' : 'See Results';
}

/* ══════════════════════════════════════════════
   ANSWER SELECTION
══════════════════════════════════════════════ */
function selectAnswer(idx, btn) {
  if (answered) return;
  answered = true;

  const q = questions[currentQ];
  const isCorrect = idx === q.correct;

  if (isCorrect) {
    score++;
    btn.classList.add('correct');
    launchConfetti();
    showFeedback(true);
  } else {
    btn.classList.add('wrong');
    // Show correct
    const btns = document.querySelectorAll('.option-btn');
    btns[q.correct].classList.add('correct');
    showFeedback(false);
  }

  // Disable all
  document.querySelectorAll('.option-btn').forEach(b=> b.disabled = true);

  // Show explanation
  setTimeout(()=>{
    const expBox = document.getElementById('explanationBox');
    expBox.style.display = 'block';
    expBox.innerHTML = `
      <div class="explain-head">💡 Explanation</div>
      ${q.explanation}
    `;
    const btnNext = document.getElementById('btnNext');
    btnNext.classList.add('show');
    btnNext.style.display = 'flex';
    document.getElementById('scoreBadge').textContent = `Score: ${score}`;
  }, 900);
}

/* ══════════════════════════════════════════════
   FEEDBACK POPUP
══════════════════════════════════════════════ */
function showFeedback(correct) {
  const pill = document.getElementById('feedbackPill');
  const emoji = document.getElementById('fpEmoji');
  const title = document.getElementById('fpTitle');
  const sub = document.getElementById('fpSub');

  pill.className = 'feedback-pill ' + (correct ? 'correct' : 'wrong');
  emoji.textContent = correct ? '🎉' : '😬';
  title.textContent = correct ? 'Nice! You protected Jiya.' : 'Oops! This could be a scam.';
  sub.textContent = correct ? 'Great catch! Keep going.' : 'Read the explanation to learn more.';

  pill.classList.add('show');
  setTimeout(()=> pill.classList.remove('show'), 2800);
}

/* ══════════════════════════════════════════════
   NEXT QUESTION
══════════════════════════════════════════════ */
function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) {
    showResults();
    return;
  }
  const overlay = document.getElementById('transition-overlay');
  overlay.classList.add('show');
  setTimeout(()=>{
    loadQuestion(currentQ);
    overlay.classList.remove('show');
  }, 320);
}

/* ══════════════════════════════════════════════
   RESULTS
══════════════════════════════════════════════ */
function showResults() {
  showScreen('screen-final');
  setTimeout(()=>{
    const pct = score / questions.length;
    let badge, badgeEmoji, badgeLabel, msg;

    if (pct <= 0.4) {
      badge = 'Beginner'; badgeEmoji = '🌱'; badgeLabel = 'KEEP LEARNING';
      msg = 'Every expert was once a beginner. <strong>Review the explanations</strong> and try again — you\'ll do better!';
    } else if (pct <= 0.8) {
      badge = 'Smart User'; badgeEmoji = '🧠'; badgeLabel = 'GOOD AWARENESS';
      msg = 'You\'re building great awareness! <strong>Because of you, Jiya stayed safer today.</strong>';
    } else {
      badge = 'Scam Protector'; badgeEmoji = '🛡️'; badgeLabel = 'CHAMPION';
      msg = '<strong>Because of you, Jiya stayed safe today.</strong> You\'re a true Digital Guardian!';
      launchConfetti(true);
    }

    document.getElementById('badgeIcon').textContent = badgeEmoji;
    document.getElementById('badgeLabel').textContent = badgeLabel;
    document.getElementById('badgeTitle').textContent = badge;
    document.getElementById('finalScore').textContent = `${score}/${questions.length}`;
    document.getElementById('finalMsg').innerHTML = msg;

    // Stars
    let stars = '';
    for(let i=0;i<5;i++) {
      stars += i < score ? '⭐' : '☆';
    }
    document.getElementById('starsRow').textContent = stars;
  }, 450);
}

/* ══════════════════════════════════════════════
   RESTART
══════════════════════════════════════════════ */
function restartQuiz() {
  startQuiz();
}

/* ══════════════════════════════════════════════
   CONFETTI
══════════════════════════════════════════════ */
function launchConfetti(big) {
  const colors = ['#4fa3e8','#22d37a','#ffd166','#ff6b6b','#7ec8e3','#a78bfa','#f59e0b'];
  const count = big ? 80 : 24;
  for(let i=0; i<count; i++) {
    setTimeout(()=>{
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random()*100 + 'vw';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
      el.style.width = (6+Math.random()*8) + 'px';
      el.style.height = (6+Math.random()*8) + 'px';
      const dur = 1.5 + Math.random()*2;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = (Math.random()*0.3) + 's';
      document.body.appendChild(el);
      setTimeout(()=> el.remove(), dur*1000+400);
    }, i*30);
  }
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
(function init() {
  const intro = document.getElementById('screen-intro');
  intro.classList.add('active');
  setTimeout(()=> intro.classList.add('visible'), 80);
})();
/* 🌗 THEME TOGGLE LOGIC */

const toggleBtn = document.getElementById('themeToggle');

// Load saved theme
if (localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light-mode');
  toggleBtn.textContent = '☀️';
}

// Toggle on click
toggleBtn.addEventListener('click', () => {
  document.body.classList.toggle('light-mode');

  if (document.body.classList.contains('light-mode')) {
    localStorage.setItem('theme', 'light');
    toggleBtn.textContent = '☀️';
  } else {
    localStorage.setItem('theme', 'dark');
    toggleBtn.textContent = '🌙';
  }
});
</script>
